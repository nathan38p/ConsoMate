<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="application-name" content="ConsoMate" />
    <meta name="apple-mobile-web-app-title" content="ConsoMate" />
    <link rel="icon" type="image/png" href="ConsoMate.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="ConsoMate.png" />
    <link rel="manifest" href="site.webmanifest" />
    <title>ConsoMate</title>
    <style>
      :root {
        --bg: #000000;
        --card: #2c2c2c;
        --text: #ffffff;
        --muted: #cbd5e1;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
        --danger: #dc2626;
        --success: #15803d;
        --border: #000000;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        background: var(--bg);
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        min-height: 100vh;
      }

      .container {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 16px 60px;
      }

      .hero {
        align-items: center;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .hero h1 {
        margin: 0;
        font-size: 2rem;
      }

      .site-title {
        color: inherit;
        text-decoration: none;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.06);
        margin-bottom: 18px;
      }

      .card h2 {
        margin-top: 0;
        margin-bottom: 16px;
        font-size: 1.1rem;
      }

      .settings-title {
        flex: 1;
        margin-bottom: 16px;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 600;
        color: var(--text);
      }

      input,
      button {
        font: inherit;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #2e2e2e;
        color: var(--text);
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button.primary {
        background: var(--accent);
        color: white;
      }

      button.primary:hover {
        background: var(--accent-dark);
      }

      button.secondary {
        background: #2e2e2e;
        color: var(--text);
      }

      .actions,
      .toolbar {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .toolbar {
        margin-bottom: 4px;
      }

      .notification-row {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: space-between;
      }

      .notification-row .hint {
        flex: 1 1 260px;
        margin: 0;
      }

      .rate-grid {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .rate-card {
        border: 1px solid var(--border);
        border-radius: 10px;
        align-content: flex-start;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 12px;
      }

      .rate-card.water {
        background: #eff6ff;
        border-color: #bfdbfe;
        color: #1d4ed8;
      }

      .rate-card.electricity {
        background: #fffbeb;
        border-color: #fde68a;
        color: #b45309;
      }

      .rate-card-title {
        font-size: 0.9rem;
        font-weight: 900;
      }

      .rate-fields {
        display: grid;
        gap: 12px;
      }

      .rate-card label {
        color: inherit;
        display: grid;
        font-size: 0.88rem;
        gap: 6px;
      }

      .rate-card input {
        background: rgba(255, 255, 255, 0.88);
        border-color: rgba(15, 23, 42, 0.16);
        color: #0f172a;
      }

      .message,
      .empty-state,
      .hint {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .message.success {
        color: var(--success);
      }

      .message.error {
        color: var(--danger);
      }

      .hidden {
        display: none;
      }

      .mate-list {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .mate-item {
        background: #282828;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 12px;
      }

      .mate-name {
        display: block;
        font-weight: 800;
      }

      .mate-email {
        color: var(--muted);
        display: block;
        font-size: 0.9rem;
        margin-top: 2px;
      }

      .user-menu {
        margin-left: auto;
        position: relative;
      }

      .user-menu-btn {
        align-items: center;
        background: #2e2e2e;
        border: 1px solid var(--border);
        color: var(--text);
        display: flex;
        height: 44px;
        justify-content: center;
        padding: 0;
        width: 44px;
      }

      .user-menu-btn svg {
        height: 21px;
        width: 21px;
      }

      .user-menu-popover {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.12);
        display: grid;
        gap: 6px;
        min-width: 180px;
        padding: 8px;
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        z-index: 10;
      }

      .user-menu-popover.hidden {
        display: none;
      }

      .user-menu-popover button {
        background: transparent;
        border-radius: 8px;
        color: var(--text);
        padding: 10px 12px;
        text-align: left;
      }

      .user-menu-popover button:hover {
        background: #2e2e2e;
      }

      hr {
        border: 0;
        border-top: 1px solid #3a3a3a;
        margin: 20px 0;
      }

      .user-menu-popover button.danger-action {
        color: var(--danger);
      }

      @media (max-width: 640px) {
        .container {
          padding: 20px 12px 40px;
        }

        .card {
          padding: 18px;
        }

        .rate-grid {
          gap: 8px;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .rate-card {
          padding: 10px;
        }

        .rate-card label {
          font-size: 0.8rem;
        }

        .rate-card input {
          padding: 9px 8px;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1><a class="site-title" href="index.html">ConsoMate</a></h1>
        <div id="user-menu" class="user-menu hidden">
          <button type="button" id="user-menu-btn" class="user-menu-btn" aria-label="Menu utilisateur" aria-expanded="false">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21a8 8 0 0 0-16 0" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </button>
          <div id="user-menu-popover" class="user-menu-popover hidden">
            <button type="button" id="logout-btn" class="danger-action">Se déconnecter</button>
          </div>
        </div>
      </header>

      <section class="card" id="settings-card">
        <div class="toolbar">
          <h2 class="settings-title">Réglages</h2>
        </div>

        <form id="profile-form">
          <label>
            Votre prénom
            <input id="profile-first-name" type="text" autocomplete="given-name" placeholder="Nathan" maxlength="60" />
          </label>
          <div class="actions">
            <button type="submit" class="primary">Enregistrer le prénom</button>
          </div>
        </form>

        <hr />

        <h2>Tarifs</h2>
        <form id="rates-form">
          <div class="rate-grid">
            <div class="rate-card water">
              <div class="rate-card-title">💧 Eau</div>
              <div class="rate-fields">
                <label>
                  Abonnement
                  <input id="water-fixed-price" type="number" inputmode="decimal" min="0" step="0.01" required />
                </label>
                <label>
                  Prix du m³
                  <input id="water-price-m3" type="number" inputmode="decimal" min="0" step="0.0001" required />
                </label>
                <label>
                  Mensualisation
                  <input id="water-monthly-payment-price" type="number" inputmode="decimal" min="0" step="0.01" required />
                </label>
              </div>
            </div>
            <div class="rate-card electricity">
              <div class="rate-card-title">⚡ Électricité</div>
              <div class="rate-fields">
                <label>
                  Abonnement
                  <input id="electricity-fixed-price" type="number" inputmode="decimal" min="0" step="0.01" required />
                </label>
                <label>
                  Prix du kWh
                  <input id="electricity-price-kwh" type="number" inputmode="decimal" min="0" step="0.0001" required />
                </label>
                <label>
                  Abonnement HP/HC
                  <input id="electricity-hphc-fixed-price" type="number" inputmode="decimal" min="0" step="0.01" required />
                </label>
                <label>
                  Prix kWh HP
                  <input id="electricity-hp-price-kwh" type="number" inputmode="decimal" min="0" step="0.0001" required />
                </label>
                <label>
                  Prix kWh HC
                  <input id="electricity-hc-price-kwh" type="number" inputmode="decimal" min="0" step="0.0001" required />
                </label>
                <label>
                  Mensualisation
                  <input id="electricity-monthly-payment-price" type="number" inputmode="decimal" min="0" step="0.01" required />
                </label>
              </div>
            </div>
          </div>
          <div class="actions">
            <button type="submit" class="primary">Enregistrer les tarifs</button>
          </div>
        </form>
        <p id="rates-message" class="message"></p>

        <hr />

        <h2>Notifications</h2>
        <div class="notification-row">
          <p class="hint">Recevoir un rappel si aucun relevé n'a été ajouté depuis 5 jours.</p>
          <button type="button" id="enable-push-btn" class="secondary">Activer les notifications</button>
        </div>
        <p id="push-message" class="message"></p>

        <hr />

        <h2>Mates</h2>
        <form id="mate-form">
          <label>
            E-mail du mate
            <input id="mate-email" type="email" placeholder="mate@example.com" required />
          </label>
          <div class="actions">
            <button type="submit" class="primary">Ajouter</button>
          </div>
        </form>

        <p class="hint">Les relevés sont partagés avec les mates ajoutés ici.</p>
        <p id="settings-message" class="message"></p>
        <div id="mates-list" class="mate-list empty-state">Chargement...</div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const DEFAULT_SUPABASE_URL = "https://jjafxjyrnysujgwwtkte.supabase.co";
      const DEFAULT_SUPABASE_KEY = "sb_publishable_KZqc80abiojlxzIe5cnJew_-L2IPfvX";
      const VAPID_PUBLIC_KEY = "BBuRxmWKL_hk2IZ0eYwcSSm-s_-XMXw8Cv4lamzH3585cEXRURRAjj5b_pe9hwNLIfxSrUN1XeYRB-typnBULGE";
      const APP_VERSION = "2026.06.17.1";
      const DEFAULT_UTILITY_RATES = {
        waterPricePerM3: 3.0833,
        electricityPricePerKwh: 0.1940,
        waterFixedPricePerMonth: 20.20 / 6,
        electricityFixedPricePerMonth: 187.82 / 12,
        electricityHphcFixedPricePerMonth: 189.96 / 12,
        electricityHpPricePerKwh: 0.2065,
        electricityHcPricePerKwh: 0.1579,
        waterMonthlyPaymentPrice: 0,
        electricityMonthlyPaymentPrice: 0
      };

      let supabaseClient = null;
      let currentSession = null;

      const userMenu = document.getElementById("user-menu");
      const userMenuBtn = document.getElementById("user-menu-btn");
      const userMenuPopover = document.getElementById("user-menu-popover");
      const logoutBtn = document.getElementById("logout-btn");
      const profileForm = document.getElementById("profile-form");
      const profileFirstName = document.getElementById("profile-first-name");
      const ratesForm = document.getElementById("rates-form");
      const waterFixedPrice = document.getElementById("water-fixed-price");
      const waterPriceM3 = document.getElementById("water-price-m3");
      const electricityFixedPrice = document.getElementById("electricity-fixed-price");
      const electricityPriceKwh = document.getElementById("electricity-price-kwh");
      const electricityHphcFixedPrice = document.getElementById("electricity-hphc-fixed-price");
      const electricityHpPriceKwh = document.getElementById("electricity-hp-price-kwh");
      const electricityHcPriceKwh = document.getElementById("electricity-hc-price-kwh");
      const waterMonthlyPaymentPrice = document.getElementById("water-monthly-payment-price");
      const electricityMonthlyPaymentPrice = document.getElementById("electricity-monthly-payment-price");
      const mateForm = document.getElementById("mate-form");
      const mateEmail = document.getElementById("mate-email");
      const settingsMessage = document.getElementById("settings-message");
      const ratesMessage = document.getElementById("rates-message");
      const matesList = document.getElementById("mates-list");
      const enablePushBtn = document.getElementById("enable-push-btn");
      const pushMessage = document.getElementById("push-message");

      function refreshInstalledAppIfNeeded() {
        const storedVersion = localStorage.getItem("consomate_app_version");
        if (storedVersion && storedVersion !== APP_VERSION) {
          localStorage.setItem("consomate_app_version", APP_VERSION);
          window.location.reload();
          return;
        }

        localStorage.setItem("consomate_app_version", APP_VERSION);
      }

      function setMessage(element, text, type = "") {
        element.textContent = text;
        element.className = `message ${type}`.trim();
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatRateInputValue(value, fallback, fractionDigits) {
        const numberValue = value === null || value === undefined || value === "" ? NaN : Number(value);
        const resolvedValue = Number.isFinite(numberValue) ? numberValue : fallback;
        return resolvedValue.toFixed(fractionDigits);
      }

      function urlBase64ToUint8Array(base64String) {
        const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
        const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
        const rawData = window.atob(base64);
        const outputArray = new Uint8Array(rawData.length);

        for (let i = 0; i < rawData.length; i += 1) {
          outputArray[i] = rawData.charCodeAt(i);
        }

        return outputArray;
      }

      async function registerServiceWorker() {
        if (!("serviceWorker" in navigator)) {
          throw new Error("Les Service Workers ne sont pas disponibles sur ce navigateur.");
        }

        return navigator.serviceWorker.register("service-worker.js");
      }

      function closeUserMenu() {
        userMenuPopover.classList.add("hidden");
        userMenuBtn.setAttribute("aria-expanded", "false");
      }

      function toggleUserMenu() {
        const isOpen = !userMenuPopover.classList.contains("hidden");
        userMenuPopover.classList.toggle("hidden", isOpen);
        userMenuBtn.setAttribute("aria-expanded", String(!isOpen));
      }

      function goHome() {
        window.location.href = "index.html";
      }

      async function initSupabaseClient() {
        supabaseClient = window.supabase.createClient(DEFAULT_SUPABASE_URL, DEFAULT_SUPABASE_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          }
        });

        const { data: sessionData } = await supabaseClient.auth.getSession();
        currentSession = sessionData.session;

        supabaseClient.auth.onAuthStateChange((_event, session) => {
          currentSession = session;
          if (!session) {
            goHome();
          }
        });

        if (!currentSession) {
          goHome();
          return;
        }

        userMenu.classList.remove("hidden");
        await ensureCurrentProfile();
        await loadCurrentProfile();
        await loadMates();
      }

      async function ensureCurrentProfile() {
        await supabaseClient.from("profiles").upsert({
          id: currentSession.user.id,
          email: currentSession.user.email.toLowerCase()
        });
      }

      async function loadCurrentProfile() {
        waterFixedPrice.value = formatRateInputValue(null, DEFAULT_UTILITY_RATES.waterFixedPricePerMonth, 2);
        waterPriceM3.value = formatRateInputValue(null, DEFAULT_UTILITY_RATES.waterPricePerM3, 4);
        electricityFixedPrice.value = formatRateInputValue(null, DEFAULT_UTILITY_RATES.electricityFixedPricePerMonth, 2);
        electricityPriceKwh.value = formatRateInputValue(null, DEFAULT_UTILITY_RATES.electricityPricePerKwh, 4);
        electricityHphcFixedPrice.value = formatRateInputValue(null, DEFAULT_UTILITY_RATES.electricityHphcFixedPricePerMonth, 2);
        electricityHpPriceKwh.value = formatRateInputValue(null, DEFAULT_UTILITY_RATES.electricityHpPricePerKwh, 4);
        electricityHcPriceKwh.value = formatRateInputValue(null, DEFAULT_UTILITY_RATES.electricityHcPricePerKwh, 4);
        waterMonthlyPaymentPrice.value = formatRateInputValue(null, DEFAULT_UTILITY_RATES.waterMonthlyPaymentPrice, 2);
        electricityMonthlyPaymentPrice.value = formatRateInputValue(null, DEFAULT_UTILITY_RATES.electricityMonthlyPaymentPrice, 2);

        const { data, error } = await supabaseClient
          .from("profiles")
          .select("first_name,water_price_per_m3,electricity_price_per_kwh,water_fixed_price_per_month,electricity_fixed_price_per_month,electricity_hphc_fixed_price_per_month,electricity_hp_price_per_kwh,electricity_hc_price_per_kwh,water_monthly_payment_price,electricity_monthly_payment_price")
          .eq("id", currentSession.user.id)
          .maybeSingle();

        if (!error && data?.first_name) {
          profileFirstName.value = data.first_name;
        }

        if (!error && data) {
          waterFixedPrice.value = formatRateInputValue(data.water_fixed_price_per_month, DEFAULT_UTILITY_RATES.waterFixedPricePerMonth, 2);
          waterPriceM3.value = formatRateInputValue(data.water_price_per_m3, DEFAULT_UTILITY_RATES.waterPricePerM3, 4);
          electricityFixedPrice.value = formatRateInputValue(data.electricity_fixed_price_per_month, DEFAULT_UTILITY_RATES.electricityFixedPricePerMonth, 2);
          electricityPriceKwh.value = formatRateInputValue(data.electricity_price_per_kwh, DEFAULT_UTILITY_RATES.electricityPricePerKwh, 4);
          electricityHphcFixedPrice.value = formatRateInputValue(data.electricity_hphc_fixed_price_per_month, DEFAULT_UTILITY_RATES.electricityHphcFixedPricePerMonth, 2);
          electricityHpPriceKwh.value = formatRateInputValue(data.electricity_hp_price_per_kwh, DEFAULT_UTILITY_RATES.electricityHpPricePerKwh, 4);
          electricityHcPriceKwh.value = formatRateInputValue(data.electricity_hc_price_per_kwh, DEFAULT_UTILITY_RATES.electricityHcPricePerKwh, 4);
          waterMonthlyPaymentPrice.value = formatRateInputValue(data.water_monthly_payment_price, DEFAULT_UTILITY_RATES.waterMonthlyPaymentPrice, 2);
          electricityMonthlyPaymentPrice.value = formatRateInputValue(data.electricity_monthly_payment_price, DEFAULT_UTILITY_RATES.electricityMonthlyPaymentPrice, 2);
        }
      }

      async function handleProfileSubmit(event) {
        event.preventDefault();
        if (!supabaseClient || !currentSession) {
          setMessage(settingsMessage, "Connectez-vous pour enregistrer votre prénom.", "error");
          return;
        }

        const firstName = profileFirstName.value.trim();
        const { error } = await supabaseClient.from("profiles").upsert({
          id: currentSession.user.id,
          email: currentSession.user.email.toLowerCase(),
          first_name: firstName || null
        });

        if (error) {
          setMessage(settingsMessage, `Impossible d'enregistrer le prénom : ${error.message}`, "error");
          return;
        }

        setMessage(settingsMessage, "Prénom enregistré.", "success");
        await loadMates();
      }

      async function handleRatesSubmit(event) {
        event.preventDefault();
        if (!supabaseClient || !currentSession) {
          setMessage(ratesMessage, "Connectez-vous pour enregistrer les tarifs.", "error");
          return;
        }

        const waterFixedPriceValue = Number(waterFixedPrice.value);
        const waterPriceM3Value = Number(waterPriceM3.value);
        const electricityFixedPriceValue = Number(electricityFixedPrice.value);
        const electricityPriceKwhValue = Number(electricityPriceKwh.value);
        const electricityHphcFixedPriceValue = Number(electricityHphcFixedPrice.value);
        const electricityHpPriceKwhValue = Number(electricityHpPriceKwh.value);
        const electricityHcPriceKwhValue = Number(electricityHcPriceKwh.value);
        const waterMonthlyPaymentPriceValue = Number(waterMonthlyPaymentPrice.value);
        const electricityMonthlyPaymentPriceValue = Number(electricityMonthlyPaymentPrice.value);
        const values = [waterFixedPriceValue, waterPriceM3Value, electricityFixedPriceValue, electricityPriceKwhValue, electricityHphcFixedPriceValue, electricityHpPriceKwhValue, electricityHcPriceKwhValue, waterMonthlyPaymentPriceValue, electricityMonthlyPaymentPriceValue];
        if (values.some((value) => !Number.isFinite(value) || value < 0)) {
          setMessage(ratesMessage, "Saisissez uniquement des prix positifs.", "error");
          return;
        }

        const { error } = await supabaseClient.from("profiles").upsert({
          id: currentSession.user.id,
          email: currentSession.user.email.toLowerCase(),
          water_fixed_price_per_month: waterFixedPriceValue,
          water_price_per_m3: waterPriceM3Value,
          electricity_fixed_price_per_month: electricityFixedPriceValue,
          electricity_price_per_kwh: electricityPriceKwhValue,
          electricity_hphc_fixed_price_per_month: electricityHphcFixedPriceValue,
          electricity_hp_price_per_kwh: electricityHpPriceKwhValue,
          electricity_hc_price_per_kwh: electricityHcPriceKwhValue,
          water_monthly_payment_price: waterMonthlyPaymentPriceValue,
          electricity_monthly_payment_price: electricityMonthlyPaymentPriceValue
        });

        if (error) {
          setMessage(ratesMessage, `Impossible d'enregistrer les tarifs : ${error.message}`, "error");
          return;
        }

      }

      async function handleMateSubmit(event) {
        event.preventDefault();
        if (!supabaseClient || !currentSession) {
          setMessage(settingsMessage, "Connectez-vous pour ajouter un mate.", "error");
          return;
        }

        const email = mateEmail.value.trim().toLowerCase();
        if (!email) {
          setMessage(settingsMessage, "Saisissez l'e-mail du mate.", "error");
          return;
        }

        if (email === currentSession.user.email.toLowerCase()) {
          setMessage(settingsMessage, "Vous êtes déjà votre propre mate.", "error");
          return;
        }

        setMessage(settingsMessage, "Recherche du mate...", "");
        const { data: profile, error: profileError } = await supabaseClient
          .from("profiles")
          .select("id,email,first_name")
          .eq("email", email)
          .maybeSingle();

        if (profileError) {
          setMessage(settingsMessage, `Impossible de rechercher ce mate : ${profileError.message}`, "error");
          return;
        }

        if (!profile) {
          setMessage(settingsMessage, "Aucun compte trouvé avec cet e-mail.", "error");
          return;
        }

        const { error } = await supabaseClient
          .from("mates")
          .upsert(
            {
              owner_id: currentSession.user.id,
              mate_id: profile.id
            },
            { onConflict: "owner_id,mate_id" }
          );

        if (error) {
          setMessage(settingsMessage, `Impossible d'ajouter ce mate : ${error.message}`, "error");
          return;
        }

        mateForm.reset();
        setMessage(settingsMessage, "Mate ajouté. Les relevés sont maintenant partagés.", "success");
        await loadMates();
      }

      async function handleEnablePush() {
        if (!supabaseClient || !currentSession) {
          setMessage(pushMessage, "Connectez-vous pour activer les notifications.", "error");
          return;
        }

        if (!("Notification" in window) || !("PushManager" in window)) {
          setMessage(pushMessage, "Les notifications push ne sont pas disponibles ici. Sur iPhone, installez ConsoMate sur l'écran d'accueil.", "error");
          return;
        }

        try {
          enablePushBtn.disabled = true;
          setMessage(pushMessage, "Demande d'autorisation...", "");

          const permission = await Notification.requestPermission();
          if (permission !== "granted") {
            setMessage(pushMessage, "Notifications refusées.", "error");
            return;
          }

          setMessage(pushMessage, "Activation des notifications...", "");
          const registration = await registerServiceWorker();
          const existingSubscription = await registration.pushManager.getSubscription();
          const subscription = existingSubscription || await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
          });

          const { error } = await supabaseClient.from("push_subscriptions").upsert(
            {
              user_id: currentSession.user.id,
              endpoint: subscription.endpoint,
              subscription: subscription.toJSON()
            },
            { onConflict: "user_id,endpoint" }
          );

          if (error) {
            setMessage(pushMessage, `Impossible d'enregistrer les notifications : ${error.message}`, "error");
            return;
          }

          setMessage(pushMessage, "Notifications activées.", "success");
        } catch (error) {
          setMessage(pushMessage, `Impossible d'activer les notifications : ${error.message}`, "error");
        } finally {
          enablePushBtn.disabled = false;
        }
      }

      async function loadMates() {
        matesList.innerHTML = '<p class="empty-state">Chargement...</p>';
        const userId = currentSession.user.id;
        const { data: mateRows, error } = await supabaseClient
          .from("mates")
          .select("id,owner_id,mate_id")
          .or(`owner_id.eq.${userId},mate_id.eq.${userId}`);

        if (error) {
          matesList.innerHTML = `<p class="empty-state">Erreur : ${escapeHtml(error.message)}</p>`;
          return;
        }

        const mateIds = [...new Set((mateRows || []).map((row) => (row.owner_id === userId ? row.mate_id : row.owner_id)))];
        if (mateIds.length === 0) {
          matesList.innerHTML = '<p class="empty-state">Aucun mate ajouté pour le moment.</p>';
          return;
        }

        const { data: profiles, error: profilesError } = await supabaseClient
          .from("profiles")
          .select("id,email,first_name")
          .in("id", mateIds);

        if (profilesError) {
          matesList.innerHTML = `<p class="empty-state">Erreur : ${escapeHtml(profilesError.message)}</p>`;
          return;
        }

        const profilesById = {};
        (profiles || []).forEach((profile) => {
          profilesById[profile.id] = profile;
        });

        matesList.innerHTML = mateIds
          .map((id) => {
            const profile = profilesById[id];
            const name = profile?.first_name?.trim() || profile?.email || id;
            const emailDetail = profile?.first_name?.trim() && profile?.email
              ? `<span class="mate-email">${escapeHtml(profile.email)}</span>`
              : "";

            return `<div class="mate-item"><span class="mate-name">${escapeHtml(name)}</span>${emailDetail}</div>`;
          })
          .join("");
      }

      async function handleLogout() {
        if (!supabaseClient) {
          return;
        }
        await supabaseClient.auth.signOut();
        goHome();
      }

      function bindEvents() {
        userMenuBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          toggleUserMenu();
        });
        document.addEventListener("click", (event) => {
          if (!userMenu.contains(event.target)) {
            closeUserMenu();
          }
        });
        logoutBtn.addEventListener("click", handleLogout);
        profileForm.addEventListener("submit", handleProfileSubmit);
        ratesForm.addEventListener("submit", handleRatesSubmit);
        mateForm.addEventListener("submit", handleMateSubmit);
        enablePushBtn.addEventListener("click", handleEnablePush);
      }

      document.addEventListener("DOMContentLoaded", () => {
        refreshInstalledAppIfNeeded();
        bindEvents();
        initSupabaseClient();
      });
    </script>
  </body>
</html>
