<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#dbeafe" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="application-name" content="ConsoMate" />
    <meta name="apple-mobile-web-app-title" content="ConsoMate" />
    <link rel="icon" type="image/png" href="ConsoMate.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="ConsoMate.png" />
    <link rel="manifest" href="site.webmanifest" />
    <title>ConsoMate</title>
    <style>
      :root {
        --bg: #000000;
        --card: #2c2c2c;
        --text: #ffffff;
        --muted: #cbd5e1;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
        --danger: #dc2626;
        --success: #15803d;
        --border: #000000;
      }

      * {
        box-sizing: border-box;
        overflow-wrap: break-word;
      }

      *,
      *::before,
      *::after {
        max-width: 100%;
      }

      html,
      body {
        background: var(--bg);
        min-height: 100%;
        max-width: 100%;
        overflow-x: hidden;
        position: relative;
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        min-height: 100vh;
        touch-action: manipulation;
        width: 100%;
        overscroll-behavior-x: none;
        overflow: hidden;
        position: fixed;
        inset: 0;
      }

      .container {
        display: flex;
        flex-direction: column;
        position: absolute;
        inset: 0;
        height: auto;
        margin: 0 auto;
        max-width: min(860px, 100%);
        overflow: hidden;
        padding: 32px 16px 0;
        width: 100%;
      }

      main,
      section,
      .card,
      .toolbar,
      .actions {
        max-width: 100%;
      }

      .hero {
        align-items: center;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        margin-bottom: 24px;
        position: relative;
        flex: 0 0 auto;
      }

      .hero h1 {
        margin: 0;
        font-size: 2rem;
      }

      .site-title {
        color: inherit;
        text-decoration: none;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.06);
        margin-bottom: 18px;
        flex: 0 0 auto;
      }

      #graph-card {
        flex: 0 0 auto;
      }

      #readings-card {
        display: flex;
        flex: 1 1 auto;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      #readings-card.hidden {
        display: none !important;
      }

      #readings-list {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        padding-bottom: calc(24px + env(safe-area-inset-bottom));
        -webkit-overflow-scrolling: touch;
        overscroll-behavior-x: none;
      }

      .card h2 {
        margin-top: 0;
        margin-bottom: 16px;
        font-size: 1.1rem;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 600;
        color: var(--text);
      }

      input,
      button {
        font: inherit;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #2e2e2e;
        color: var(--text);
        min-width: 0;
        max-width: 100%;
        appearance: none;
        -webkit-appearance: none;
      }

      input[type="datetime-local"] {
        display: block;
        min-width: 0;
        max-width: 100%;
        width: 100%;
      }

      input[type="datetime-local"]::-webkit-date-and-time-value {
        min-width: 0;
        text-align: center;
      }

      .actions,
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .user-menu {
        margin-left: auto;
        position: relative;
      }

      .top-actions {
        align-items: center;
        display: flex;
        gap: 10px;
        margin-left: auto;
      }

      .add-reading-btn {
        align-items: center;
        background: var(--accent);
        color: white;
        display: flex;
        font-size: 2rem;
        font-weight: 400;
        height: 44px;
        justify-content: center;
        line-height: 1;
        padding: 0;
        width: 44px;
        padding-bottom: 2px;
      }

      .add-reading-btn:hover {
        background: var(--accent-dark);
      }

      .user-menu-btn {
        align-items: center;
        background: #2e2e2e;
        border: 1px solid var(--border);
        color: var(--text);
        display: flex;
        height: 44px;
        justify-content: center;
        padding: 0;
        width: 44px;
      }

      .user-menu-btn svg {
        height: 21px;
        width: 21px;
      }

      .user-menu-popover {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.12);
        display: grid;
        gap: 6px;
        min-width: 180px;
        padding: 8px;
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        z-index: 10;
      }

      .user-menu-popover.hidden {
        display: none;
      }

      .user-menu-popover button {
        background: transparent;
        border-radius: 8px;
        color: var(--text);
        padding: 10px 12px;
        text-align: left;
      }

      .user-menu-popover button:hover {
        background: #2e2e2e;
      }

      .user-menu-popover button.danger-action {
        color: var(--danger);
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
        transform: none;
      }

      button.primary {
        background: var(--accent);
        color: white;
      }

      button.primary:hover {
        background: var(--accent-dark);
      }

      button.secondary {
        background: #e2e8f0;
        color: var(--text);
      }

      button.danger {
        background: #fee2e2;
        color: var(--danger);
      }

      button.danger:hover {
        background: #fecaca;
      }

      button.ghost {
        background: transparent;
        color: var(--accent);
        padding-left: 0;
      }

      .auth-secondary-action {
        margin: 0;
      }

      .auth-secondary-action button {
        color: var(--muted);
        font-size: 0.92rem;
        font-weight: 700;
        padding: 0;
      }

      .hint,
      .message,
      .empty-state {
        font-size: 0.95rem;
        color: var(--muted);
      }

      .message.success {
        color: var(--success);
      }

      .message.error {
        color: var(--danger);
      }

      .message:empty {
        display: none;
      }

      .hidden {
        display: none !important;
      }

      .type-options {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .type-option {
        align-items: center;
        border: none;
        border-radius: 12px;
        color: var(--text);
        display: flex;
        font-weight: 700;
        gap: 10px;
        justify-content: center;
        min-height: 56px;
        padding: 12px;
      }

      .type-option[data-reading-type="water"] {
        background: #7cb5ff;
        color: #1e40af;
      }

      .type-option[data-reading-type="electricity"] {
        background: #ffea96;
        color: #92400e;
      }

      .type-option[aria-pressed="true"] {
        box-shadow: inset 0 0 0 2px currentColor;
        transform: translateY(-1px);
      }

      .type-emoji {
        font-size: 1.3rem;
      }

      .meter-input {
        display: grid;
        gap: 8px;
      }

      .meter-digits {
        display: grid;
        gap: 6px;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .electricity-meter-row {
        display: grid;
        gap: 6px;
      }

      .electricity-meter-label {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
      }

      .electricity-meter-input .meter-digits {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .electricity-meter-input .meter-caption {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .electricity-meter-input .meter-unit {
        grid-column: 5;
      }

      .meter-digit {
        border: none;
        border-radius: 8px;
        font-size: 1.25rem;
        font-weight: 800;
        height: 48px;
        padding: 0;
        text-align: center;
      }

      .meter-digit.black {
        background: #111827;
        color: #ffffff;
      }

      .meter-digit.red {
        background: #b91c1c;
        color: #ffffff;
      }

      .meter-caption {
        color: var(--muted);
        display: grid;
        font-size: 0.85rem;
        font-weight: 700;
        gap: 6px;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        text-align: center;
      }

      .meter-unit {
        grid-column: 4;
      }

      .owner-pill {
        background: #e0f2fe;
        border-radius: 999px;
        color: #0369a1;
        display: inline-block;
        font-size: 0.8rem;
        font-weight: 700;
        margin-left: 6px;
        padding: 2px 8px;
      }

      .reading-item {
        align-items: center;
        border: 1px solid var(--border);
        background: #282828;
        border-radius: 10px;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        margin-top: 8px;
        padding: 8px 10px;
      }

      .reading-item.water {
        background: #eff6ff;
        border-color: #bfdbfe;
      }

      .reading-item.electricity {
        background: #fffbeb;
        border-color: #fde68a;
      }

      .reading-item strong {
        display: block;
        font-size: 0.98rem;
        margin-bottom: 2px;
      }

      .reading-item.water strong {
        color: #1d4ed8;
      }

      .reading-item.electricity strong {
        color: #b45309;
      }

      .reading-date {
        color: #64748b;
        font-size: 0.9rem;
      }

      .reading-detail {
        color: var(--muted);
        font-size: 0.86rem;
        margin-top: 2px;
      }

      .reading-footer {
        align-items: center;
        display: flex;
        flex: 0 0 auto;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      .reading-content {
        flex: 1;
      }

      .reading-item.clickable {
        cursor: pointer;
      }

      .reading-item.clickable:hover {
        transform: translateY(-1px);
      }

      .delete-reading-btn {
        align-items: center;
        display: inline-flex;
        height: 34px;
        justify-content: center;
        padding: 0;
        width: 34px;
      }

      .delete-reading-btn svg {
        height: 17px;
        width: 17px;
      }

      .graph-toolbar {
        align-items: center;
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .section-header {
        align-items: center;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .section-header h2 {
        margin: 0;
      }

      .hphc-toggle {
        align-items: center;
        color: var(--muted);
        cursor: pointer;
        display: inline-flex;
        font-size: 0.8rem;
        font-weight: 800;
        gap: 8px;
        user-select: none;
      }

      .hphc-toggle input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .hphc-switch {
        background: #cbd5e1;
        border-radius: 999px;
        display: inline-flex;
        height: 20px;
        padding: 2px;
        transition: background 0.2s ease;
        width: 38px;
      }

      .hphc-switch::after {
        background: #ffffff;
        border-radius: 50%;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.24);
        content: "";
        height: 16px;
        transition: transform 0.2s ease;
        width: 16px;
      }

      .hphc-toggle input:checked ~ .hphc-switch {
        background: #f59e0b;
      }

      .hphc-toggle input:checked ~ .hphc-switch::after {
        transform: translateX(18px);
      }

      .hphc-label {
        display: inline-flex;
      }

      .hphc-toggle input:checked ~ .hphc-label .hphc-label-hp {
        color: #ea580c;
      }

      .hphc-toggle input:checked ~ .hphc-label .hphc-label-hc {
        color: #fbbf24;
      }

      .month-label {
        color: var(--text);
        font-weight: 700;
        min-width: 130px;
        text-align: center;
      }

      .graph-frame {
        min-height: 310px;
        overflow: hidden;
      }

      .graph-frame svg {
        display: block;
        height: auto;
        max-width: 100%;
        width: 100%;
        overflow: hidden;
      }

      .cost-summary {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-top: 12px;
      }

      .cost-item {
        border: 1px solid var(--border);
        border-radius: 10px;
        display: grid;
        gap: 4px;
        padding: 12px;
      }

      .cost-item.water {
        background: #eff6ff;
        border-color: #bfdbfe;
        color: #1d4ed8;
      }

      .cost-item.electricity {
        background: #fffbeb;
        border-color: #fde68a;
        color: #b45309;
      }

      .cost-item.hphc {
        background: #f8fafc;
        border-color: #cbd5e1;
        color: #475569;
      }

      .cost-item.forecast {
        border-style: dashed;
      }

      .cost-heading {
        align-items: baseline;
        display: flex;
        gap: 8px;
        justify-content: space-between;
        min-width: 0;
      }

      .cost-label {
        font-size: 0.82rem;
        font-weight: 800;
      }

      .cost-price-row {
        align-items: baseline;
        color: var(--text);
        display: flex;
        gap: 10px;
        justify-content: space-between;
      }

      .cost-value {
        color: #000000;
        font-size: 1.08rem;
        font-weight: 900;
        white-space: nowrap;
      }

      .cost-usage {
        color: inherit;
        font-size: 0.85rem;
        font-weight: 800;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .cost-detail {
        color: #64748b;
        font-size: 0.74rem;
        font-weight: 700;
      }

      @media (max-width: 640px) {
        .container {
          padding: 20px 12px 0;
        }

        .card {
          padding: 18px;
          margin-bottom: 12px;
        }

        input[type="datetime-local"] {
          font-size: 1rem;
          padding-left: 10px;
          padding-right: 10px;
        }

        #graph-card {
          padding: 16px 14px;
        }

        #readings-card {
          padding-bottom: 0;
        }

        .graph-toolbar {
          flex-wrap: wrap;
          gap: 8px;
          margin-bottom: 6px;
        }

        .month-label {
          font-size: 0.95rem;
          min-width: 96px;
        }

        .graph-frame {
          min-height: 0;
        }

        .graph-frame svg {
          max-height: 240px;
        }

        .cost-summary {
          gap: 8px;
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .cost-item {
          padding: 10px;
        }

        .cost-price-row {
          align-items: baseline;
          flex-direction: row;
          gap: 8px;
        }

        .cost-value {
          font-size: 1rem;
        }

        .cost-usage {
          font-size: 0.76rem;
        }

        .reading-item {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1><a class="site-title" href="index.html?v=2">ConsoMate</a></h1>
        <div id="top-actions" class="top-actions hidden">
          <button type="button" id="add-reading-btn" class="add-reading-btn" aria-label="Ajouter un relevé">+</button>
          <div id="user-menu" class="user-menu">
            <button type="button" id="user-menu-btn" class="user-menu-btn" aria-label="Menu utilisateur" aria-expanded="false">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21a8 8 0 0 0-16 0" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </button>
            <div id="user-menu-popover" class="user-menu-popover hidden">
              <button type="button" id="settings-btn">Réglages</button>
              <button type="button" id="logout-btn" class="danger-action">Se déconnecter</button>
            </div>
          </div>
        </div>
      </header>

      <section class="card" id="auth-card">
        <h2 id="auth-title">Connexion</h2>
        <form id="auth-form" autocomplete="on">
          <label id="auth-email-label">
            E-mail
            <input id="auth-email" name="email" type="email" autocomplete="email" required />
          </label>
          <label id="auth-password-label">
            <span id="auth-password-label-text">Mot de passe</span>
            <input id="auth-password" name="password" type="password" autocomplete="current-password" minlength="6" required />
          </label>
          <div class="actions">
            <button type="submit" id="auth-submit-btn" class="primary">Se connecter</button>
            <button type="button" id="signup-btn" class="secondary">Créer un compte</button>
          </div>
          <p class="auth-secondary-action">
            <button type="button" id="forgot-password-btn" class="ghost">Mot de passe oublié ?</button>
          </p>
        </form>
        <p id="auth-message" class="message"></p>
      </section>

      <section class="card hidden" id="app-card">
        <div class="toolbar">
          <h2 style="margin: 0; flex: 1">Ajouter un relevé</h2>
        </div>

        <form id="reading-form">
          <label>
            Type
            <div class="type-options" role="group" aria-label="Type de relevé">
              <button type="button" class="type-option" data-reading-type="water" aria-pressed="true">
                <span class="type-emoji" aria-hidden="true">💧</span>
                Eau
              </button>
              <button type="button" class="type-option" data-reading-type="electricity" aria-pressed="false">
                <span class="type-emoji" aria-hidden="true">⚡</span>
                Électricité
              </button>
            </div>
          </label>
          <label>
            Date et heure du relevé
            <input id="reading-date" type="datetime-local" required />
          </label>
          <label>
            Valeur
            <div id="water-meter-input" class="meter-input">
              <div class="meter-digits" aria-label="Valeur du compteur d'eau">
                <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-meter-digit="whole" aria-label="Milliers de mètre cube" />
                <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-meter-digit="whole" aria-label="Centaines de mètre cube" />
                <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-meter-digit="whole" aria-label="Dizaines de mètre cube" />
                <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-meter-digit="whole" aria-label="Unités de mètre cube" />
                <input class="meter-digit red" type="text" inputmode="numeric" maxlength="1" data-meter-digit="decimal" aria-label="Première décimale" />
                <input class="meter-digit red" type="text" inputmode="numeric" maxlength="1" data-meter-digit="decimal" aria-label="Deuxième décimale" />
                <input class="meter-digit red" type="text" inputmode="numeric" maxlength="1" data-meter-digit="decimal" aria-label="Troisième décimale" />
              </div>
              <div class="meter-caption">
                <span class="meter-unit">m³</span>
              </div>
            </div>
            <div id="electricity-meter-input" class="meter-input electricity-meter-input hidden">
              <div class="electricity-meter-row">
                <span class="electricity-meter-label">HC</span>
                <div class="meter-digits" aria-label="Valeur du compteur heures creuses">
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hc" aria-label="Dizaine de milliers heures creuses" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hc" aria-label="Milliers heures creuses" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hc" aria-label="Centaines heures creuses" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hc" aria-label="Dizaines heures creuses" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hc" aria-label="Unités heures creuses" />
                </div>
              </div>
              <div class="electricity-meter-row">
                <span class="electricity-meter-label">HP</span>
                <div class="meter-digits" aria-label="Valeur du compteur heures pleines">
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hp" aria-label="Dizaine de milliers heures pleines" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hp" aria-label="Milliers heures pleines" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hp" aria-label="Centaines heures pleines" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hp" aria-label="Dizaines heures pleines" />

      function getWaterMeterValue() {

        const whole = waterMeterDigitInputs

        const decimals = waterMeterDigitInputs

        return Number(`${whole}.${decimals}`);

      function handleMeterDigitInput(event) {
        const input = event.target;
        input.value = input.value.replace(/\D/g, "").slice(-1);

        if (input.value) {
          const digitInputs = [...input.closest(".meter-input").querySelectorAll(".meter-digit")];
          const currentIndex = digitInputs.indexOf(input);
          const nextInput = digitInputs[currentIndex + 1];

          if (nextInput) {

            input.blur();
          }
        }
      }

      function handleMeterDigitKeydown(event) {
        if (event.key !== "Backspace" || event.target.value) {
          return;

        const digitInputs = [...event.target.closest(".meter-input").querySelectorAll(".meter-digit")];
        const previousInput = digitInputs[digitInputs.indexOf(event.target) - 1];
        if (previousInput) {
          previousInput.focus();

      function buildConsumptionData(readings, type, monthStart, monthEnd, getValue = getReadingTotalValue) {
        const dailyTotals = new Map();
        const groupedReadings = new Map();
        let firstReadingDate = null;
        let latestConsumptionDate = null;

        readings
          .filter((reading) => reading.type === type)
          .forEach((reading) => {
            const ownerReadings = groupedReadings.get(reading.user_id) || [];
            ownerReadings.push(reading);
            groupedReadings.set(reading.user_id, ownerReadings);
          });

        groupedReadings.forEach((ownerReadings) => {
          const sortedOwnerReadings = ownerReadings.sort((a, b) => {
            const readingDateDiff = new Date(getReadingDatetime(a)) - new Date(getReadingDatetime(b));
            if (readingDateDiff !== 0) {
              return readingDateDiff;
            }

            return new Date(a.created_at) - new Date(b.created_at);
          });

          sortedOwnerReadings.forEach((reading, index, sortedReadings) => {
            const candidateFirstReadingDate = new Date(getReadingDatetime(reading));
            if (!Number.isNaN(candidateFirstReadingDate.getTime()) && (!firstReadingDate || candidateFirstReadingDate < firstReadingDate)) {
              firstReadingDate = candidateFirstReadingDate;
            }

            const readingDate = new Date(getReadingDatetime(reading));
            if (readingDate < monthStart || readingDate >= monthEnd || index === 0) {
              return;
            }

            const previousValue = getValue(sortedReadings[index - 1]);
            const currentValue = getValue(reading);
            const consumption = currentValue - previousValue;
            if (Number.isNaN(consumption) || consumption < 0) {
              return;
            }

            const day = readingDate.getDate();
            dailyTotals.set(day, (dailyTotals.get(day) || 0) + consumption);
            if (!latestConsumptionDate || readingDate > latestConsumptionDate) {
              latestConsumptionDate = readingDate;
            }
          });
        });

        let cumulative = 0;
        const series = Array.from(dailyTotals.entries())
          .sort(([dayA], [dayB]) => dayA - dayB)
          .map(([day, total]) => {
            cumulative += total;
            return {
              day,
              value: cumulative
            };
          });

        if (series.length === 0) {
          return {
            series: [],
            firstReadingDate,
            latestConsumptionDate: null
          };
        }

        return {
          series: [
            {
              day: 1,
              value: 0
            },
            ...series
          ],
          firstReadingDate,
          latestConsumptionDate
        };
      }

      function getForecastTotal(consumptionData, monthStart) {
        const { series } = consumptionData;
        const actualPoints = series.filter((point) => point.value > 0).slice(-3);
        if (actualPoints.length < 2) {
          return 0;
        }

        const daysInMonth = new Date(monthStart.getFullYear(), monthStart.getMonth() + 1, 0).getDate();
        const firstPoint = actualPoints[0];
        const lastPoint = actualPoints[actualPoints.length - 1];
        if (lastPoint.day >= daysInMonth) {
          return 0;
        }

        const elapsedDays = Math.max(lastPoint.day - firstPoint.day, 1);
        const dailyAverage = (lastPoint.value - firstPoint.value) / elapsedDays;
        const remainingDays = daysInMonth - lastPoint.day;
        const projectedValue = lastPoint.value + dailyAverage * remainingDays;

        if (!Number.isFinite(projectedValue) || projectedValue <= lastPoint.value) {
          return 0;
        }

        return projectedValue;
      }

      function createPolyline(points, maxValue, chart, daysInMonth) {
        if (points.length === 0 || maxValue <= 0) {
          return "";
        }

        return points
          .map((point) => {
            const x = chart.left + ((point.day - 1) / Math.max(daysInMonth - 1, 1)) * chart.width;
            const y = chart.top + chart.height - (point.value / maxValue) * chart.height;
            return `${x.toFixed(1)},${y.toFixed(1)}`;
          })
          .join(" ");
      }

      function createPointCircles(points, maxValue, chart, daysInMonth, color) {
        if (points.length === 0 || maxValue <= 0) {
          return "";
        }

        return points
          .filter((point) => point.value > 0)
          .map((point) => {
            const x = chart.left + ((point.day - 1) / Math.max(daysInMonth - 1, 1)) * chart.width;
            const y = chart.top + chart.height - (point.value / maxValue) * chart.height;
            return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="${color}" />`;
          })
          .join("");
      }

      function createXAxisLabels(chart, daysInMonth, y = 226) {
        return [1, 10, 20, daysInMonth]
          .filter((day, index, days) => days.indexOf(day) === index && day <= daysInMonth)
          .map((day) => {
            const x = chart.left + ((day - 1) / Math.max(daysInMonth - 1, 1)) * chart.width;
            const anchor = day === 1 ? "start" : day === daysInMonth ? "end" : "middle";
            return `<text x="${x.toFixed(1)}" y="${y}" fill="#64748b" font-size="12" text-anchor="${anchor}">${day}</text>`;
          })
          .join("");
      }

      function formatGraphMax(value, unit) {
        if (value === 0) {
          return `0 ${unit}`;
        }

        if (unit === "kWh") {
          return `${Math.round(value)} ${unit}`;
        }

        const precision = value < 1 ? 3 : 1;
        return `${value.toFixed(precision)} ${unit}`;
      }

      function formatCurrency(value) {
        return value.toLocaleString("fr-FR", {
          style: "currency",
          currency: "EUR",
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      function getSeriesTotal(series) {
        if (series.length === 0) {
          return 0;
        }

        return series[series.length - 1].value;
      }

      function formatTotalCost(value, monthlyPaymentPrice) {
        const exceedsMonthlyPayment = monthlyPaymentPrice > 0 && value > monthlyPaymentPrice;
        return `${exceedsMonthlyPayment ? "⚠️ " : ""}${formatCurrency(value)}`;
      }

      function formatHphcSavings(baseTotal, hphcTotal) {
        const difference = baseTotal - hphcTotal;
        if (Math.abs(difference) < 0.01) {
          return "0,00 €";
        }

        return `${difference > 0 ? "📉" : "📈"} ${formatCurrency(Math.abs(difference))}`;
      }

      function formatHphcUsage(hpValue, hcValue) {
        return `${Math.round(hpValue)} + ${Math.round(hcValue)} kWh`;
      }

      function getHphcTotalCost(hpConsumption, hcConsumption) {
        return hpConsumption * utilityRates.electricityHpPricePerKwh + hcConsumption * utilityRates.electricityHcPricePerKwh + utilityRates.electricityHphcFixedPricePerMonth;
      }

      function renderCostSummary(waterConsumption, electricityConsumption, waterForecast, electricityForecast, hphcSummary = null) {
        const waterVariableCost = waterConsumption * utilityRates.waterPricePerM3;
        const electricityVariableCost = electricityConsumption * utilityRates.electricityPricePerKwh;
        const waterTotal = waterVariableCost + utilityRates.waterFixedPricePerMonth;
        const electricityTotal = electricityVariableCost + utilityRates.electricityFixedPricePerMonth;
        const waterForecastVariableCost = waterForecast * utilityRates.waterPricePerM3;
        const electricityForecastVariableCost = electricityForecast * utilityRates.electricityPricePerKwh;
        const waterForecastTotal = waterForecast ? waterForecastVariableCost + utilityRates.waterFixedPricePerMonth : 0;
        const electricityForecastTotal = hphcSummary?.forecastTotal || (electricityForecast ? electricityForecastVariableCost + utilityRates.electricityFixedPricePerMonth : 0);
        const electricityForecastUsage = hphcSummary?.forecastTotal
          ? formatHphcUsage(hphcSummary.hpForecast, hphcSummary.hcForecast)
          : formatGraphMax(electricityForecast, "kWh");
        const waterForecastCard = waterForecast
          ? `<div class="cost-item water forecast">
              <span class="cost-heading">
                <span class="cost-label">Prév.</span>
                <span class="cost-usage">${formatGraphMax(waterForecast, "m³")}</span>
              </span>
              <span class="cost-price-row">
                <span class="cost-value">${formatTotalCost(waterForecastTotal, utilityRates.waterMonthlyPaymentPrice)}</span>
              </span>
            </div>`
          : "";
        const electricityForecastSavings = hphcSummary?.forecastTotal
          ? `<span class="cost-detail">${formatHphcSavings(electricityForecastVariableCost + utilityRates.electricityFixedPricePerMonth, hphcSummary.forecastTotal)}</span>`
          : "";
        const electricityForecastCard = (hphcSummary?.forecastTotal || electricityForecast)
          ? `<div class="cost-item electricity forecast">
              <span class="cost-heading">
                <span class="cost-label">Prév.</span>
                <span class="cost-usage">${electricityForecastUsage}</span>
              </span>
              <span class="cost-price-row">
                <span class="cost-value">${formatTotalCost(electricityForecastTotal, utilityRates.electricityMonthlyPaymentPrice)}</span>
                ${electricityForecastSavings}
              </span>
            </div>`
          : "";
        const hphcCard =
          hphcSummary && (hphcSummary.hpConsumption > 0 || hphcSummary.hcConsumption > 0)
            ? `<div class="cost-item electricity">
                <span class="cost-heading">
                  <span class="cost-label">⚡</span>
                  <span class="cost-usage">${formatHphcUsage(hphcSummary.hpConsumption, hphcSummary.hcConsumption)}</span>
                </span>
                <span class="cost-price-row">
                  <span class="cost-value">${formatCurrency(hphcSummary.total)}</span>
                  <span class="cost-detail">${formatHphcSavings(electricityTotal, hphcSummary.total)}</span>
                </span>
              </div>`
            : "";
        const electricityCard = hphcCard || `<div class="cost-item electricity">
            <span class="cost-heading">
              <span class="cost-label">⚡</span>
              <span class="cost-usage">${formatGraphMax(electricityConsumption, "kWh")}</span>
            </span>
            <span class="cost-price-row">
              <span class="cost-value">${formatTotalCost(electricityTotal, utilityRates.electricityMonthlyPaymentPrice)}</span>
            </span>
          </div>`;

        graphCostSummary.innerHTML = `
          <div class="cost-item water">
            <span class="cost-heading">
              <span class="cost-label">💧</span>
              <span class="cost-usage">${formatGraphMax(waterConsumption, "m³")}</span>
            </span>
            <span class="cost-price-row">
              <span class="cost-value">${formatTotalCost(waterTotal, utilityRates.waterMonthlyPaymentPrice)}</span>
            </span>
          </div>
          ${electricityCard}
          ${waterForecastCard}
          ${electricityForecastCard}
        `;
      }

      function formatMeterIndex(value) {
        const numericValue = Number(value);
        if (!Number.isFinite(numericValue)) {
          return value;
        }

        return String(Math.trunc(numericValue)).padStart(5, "0");
      }

      function renderGraph(readings = []) {
        graphReadings = readings;
        updateHphcToggleVisibility();
        const availableMonthKeys = ensureSelectedGraphMonthHasData(readings);
        const selectedMonthKey = getMonthKey(selectedGraphMonth);
        const selectedMonthIndex = availableMonthKeys.indexOf(selectedMonthKey);
        const { start, end } = getMonthBounds(selectedGraphMonth);
        graphMonthLabel.textContent = formatMonthLabel(start);
        prevMonthBtn.disabled = selectedMonthIndex <= 0;
        nextMonthBtn.disabled = selectedMonthIndex === -1 || selectedMonthIndex >= availableMonthKeys.length - 1;

        const waterData = buildConsumptionData(readings, "water", start, end);
        const electricityData = buildConsumptionData(readings, "electricity", start, end);
        const electricityHpData = buildConsumptionData(readings, "electricity", start, end, (reading) => getElectricityPartReadingValue(reading, "hp"));
        const electricityHcData = buildConsumptionData(readings, "electricity", start, end, (reading) => getElectricityPartReadingValue(reading, "hc"));
        const waterSeries = waterData.series;
        const electricitySeries = electricityData.series;
        const electricityHpSeries = electricityHpData.series;
        const electricityHcSeries = electricityHcData.series;
        const waterForecast = getForecastTotal(waterData, start);
        const electricityForecast = getForecastTotal(electricityData, start);
        const electricityHpForecast = getForecastTotal(electricityHpData, start);
        const electricityHcForecast = getForecastTotal(electricityHcData, start);
        const electricityHpTotal = getSeriesTotal(electricityHpSeries);
        const electricityHcTotal = getSeriesTotal(electricityHcSeries);
        const hphcSummary = isHphcModeEnabled
          ? {
              hpConsumption: electricityHpTotal,
              hcConsumption: electricityHcTotal,
              total: getHphcTotalCost(electricityHpTotal, electricityHcTotal),
              hpForecast: electricityHpForecast,
              hcForecast: electricityHcForecast,
              forecastTotal: electricityHpForecast || electricityHcForecast ? getHphcTotalCost(electricityHpForecast, electricityHcForecast) : 0
            }
          : null;
        renderCostSummary(getSeriesTotal(waterSeries), getSeriesTotal(electricitySeries), waterForecast, electricityForecast, hphcSummary);
        const waterMax = Math.max(...waterSeries.map((point) => point.value), 0);
        const electricityMax = Math.max(...electricitySeries.map((point) => point.value), 0);
        const electricityHpMax = Math.max(...electricityHpSeries.map((point) => point.value), 0);
        const electricityHcMax = Math.max(...electricityHcSeries.map((point) => point.value), 0);
        const displayedElectricityMax = isHphcModeEnabled ? Math.max(electricityHpMax, electricityHcMax, 0) : electricityMax;

        if (waterMax === 0 && displayedElectricityMax === 0) {
          graphFrame.innerHTML = '<p class="empty-state">Aucune consommation calculable pour ce mois.</p>';
          return;
        }

        const chart = {
          left: 54,
          top: 18,
          width: 520,
          height: 230
        };
        const svgHeight = chart.top + chart.height + 47;
        const graphEndDay = new Date(start.getFullYear(), start.getMonth() + 1, 0).getDate();
        const waterPoints = createPolyline(waterSeries, waterMax, chart, graphEndDay);
        const electricityPoints = createPolyline(electricitySeries, electricityMax, chart, graphEndDay);
        const electricityHpPoints = createPolyline(electricityHpSeries, displayedElectricityMax, chart, graphEndDay);
        const electricityHcPoints = createPolyline(electricityHcSeries, displayedElectricityMax, chart, graphEndDay);
        const waterMarkers = createPointCircles(waterSeries, waterMax, chart, graphEndDay, "#2563eb");
        const electricityMarkers = createPointCircles(electricitySeries, electricityMax, chart, graphEndDay, "#f59e0b");
        const electricityHpMarkers = createPointCircles(electricityHpSeries, displayedElectricityMax, chart, graphEndDay, "#ea580c");
        const electricityHcMarkers = createPointCircles(electricityHcSeries, displayedElectricityMax, chart, graphEndDay, "#fbbf24");
        const xAxisLabels = createXAxisLabels(chart, graphEndDay, chart.top + chart.height + 28);
        const electricitySeriesMarkup = isHphcModeEnabled
          ? `${
              electricityHpPoints
                ? `<polyline points="${electricityHpPoints}" fill="none" stroke="#ea580c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />`
                : ""
            }${
              electricityHcPoints
                ? `<polyline points="${electricityHcPoints}" fill="none" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />`
                : ""
            }${electricityHpMarkers}${electricityHcMarkers}`
          : `${
              electricityPoints
                ? `<polyline points="${electricityPoints}" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />`
                : ""
            }${electricityMarkers}`;
        graphFrame.innerHTML = `
          <svg viewBox="0 0 650 ${svgHeight}" role="img" aria-label="Consommation mensuelle">
            <line x1="${chart.left}" y1="${chart.top}" x2="${chart.left}" y2="${chart.top + chart.height}" stroke="#cbd5e1" />
            <line x1="${chart.left + chart.width}" y1="${chart.top}" x2="${chart.left + chart.width}" y2="${chart.top + chart.height}" stroke="#cbd5e1" />
            <line x1="${chart.left}" y1="${chart.top + chart.height}" x2="${chart.left + chart.width}" y2="${chart.top + chart.height}" stroke="#cbd5e1" />
            <text x="8" y="${chart.top + 12}" fill="#2563eb" font-size="12">${formatGraphMax(waterMax, "m3")}</text>
            <text x="8" y="${chart.top + chart.height}" fill="#2563eb" font-size="12">${formatGraphMax(0, "m3")}</text>
            <text x="642" y="${chart.top + 12}" fill="#b45309" font-size="12" text-anchor="end">${formatGraphMax(displayedElectricityMax, "kWh")}</text>
            <text x="642" y="${chart.top + chart.height}" fill="#b45309" font-size="12" text-anchor="end">${formatGraphMax(0, "kWh")}</text>
            ${xAxisLabels}
            ${
              waterPoints
                ? `<polyline points="${waterPoints}" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />`
                : ""
            }
            ${electricitySeriesMarkup}
            ${waterMarkers}
          </svg>
        `;
      }

      function renderReadingsList(readings = []) {
        const selectedMonthKey = getMonthKey(selectedGraphMonth);
        const monthlyReadings = readings.filter((reading) => getReadingMonthKey(reading) === selectedMonthKey);

        if (monthlyReadings.length === 0) {
          readingsList.innerHTML = '<p class="empty-state">Aucun relevé enregistré pour ce mois.</p>';
          return;
        }

        readingsList.innerHTML = monthlyReadings
          .map((reading) => {
            const typeLabel = reading.type === "water" ? "Eau" : "Électricité";
            const typeClass = reading.type === "water" ? "water" : "electricity";
            // const ownerLabel = profileLabelsById[reading.user_id] || (reading.user_id === currentSession.user.id ? "Moi" : "Mate");
            const totalValue = getReadingTotalValue(reading);
            const hasElectricityDetails = reading.type === "electricity" && reading.value_hp != null && reading.value_hc != null;
            const readingDetail = hasElectricityDetails
              ? `<div class="reading-detail">HC ${escapeHtml(formatMeterIndex(reading.value_hc))} kWh · HP ${escapeHtml(formatMeterIndex(reading.value_hp))} kWh</div>`
              : "";
            const deleteButton =
              reading.user_id === currentSession.user.id
                ? `<button type="button" class="danger delete-reading-btn" data-delete-reading-id="${escapeHtml(reading.id)}" aria-label="Supprimer" title="Supprimer">
                    <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M3 6h18" />
                      <path d="M8 6V4h8v2" />
                      <path d="M19 6l-1 14H6L5 6" />
                      <path d="M10 11v5" />
                      <path d="M14 11v5" />
                    </svg>
                  </button>`
                : "";

            return `
              <article class="reading-item ${typeClass}">
                <div class="reading-content">
                  <strong>${typeLabel} — ${escapeHtml(totalValue)} ${escapeHtml(reading.unit)}</strong>
                  ${readingDetail}
                  <div class="reading-date">${escapeHtml(formatReadingDate(getReadingDatetime(reading)))}</div>
                </div>
                <div class="reading-footer">
                  ${deleteButton}
                </div>
              </article>
            `;
          })
          .join("");
      }

      async function deleteReading(readingId) {
        if (!supabaseClient || !currentSession) {
          setMessage(readingMessage, "Vous devez être connecté pour supprimer un relevé.", "error");
          return;
        }

        const shouldDelete = window.confirm("Supprimer ce relevé ?");
        if (!shouldDelete) {
          return;
        }

        const { error } = await supabaseClient
          .from("readings")
          .delete()
          .eq("id", readingId)
          .eq("user_id", currentSession.user.id);

        if (error) {
          setMessage(readingMessage, `Impossible de supprimer le relevé : ${error.message}`, "error");
          return;
        }

        setMessage(readingMessage, "Relevé supprimé.", "success");
        await loadReadings();
      }

      async function loadMates() {
        if (!supabaseClient || !currentSession) {
          return;
        }

        const userId = currentSession.user.id;
        sharedUserIds = [userId];
        profileLabelsById = {
          [userId]: currentSession.user.email
        };

        const { data: mateRows, error } = await supabaseClient
          .from("mates")
          .select("id,owner_id,mate_id")
          .or(`owner_id.eq.${userId},mate_id.eq.${userId}`);

        if (error) {
          return;
        }

        const mateIds = [...new Set((mateRows || []).map((row) => (row.owner_id === userId ? row.mate_id : row.owner_id)))];
        sharedUserIds = [userId, ...mateIds];
        const profileIds = [userId, ...mateIds];

        const { data: profiles, error: profilesError } = await supabaseClient
          .from("profiles")
          .select("id,email,first_name")
          .in("id", profileIds);

        if (profilesError) {
          return;
        }

        (profiles || []).forEach((profile) => {
          profileLabelsById[profile.id] = getProfileLabel(profile);
        });
      }

      async function handleReadingSubmit(event) {
        event.preventDefault();
        if (!supabaseClient || !currentSession) {
          setMessage(readingMessage, "Vous devez être connecté pour enregistrer un relevé.", "error");
          return;
        }

        const readingDateInput = document.getElementById("reading-date").value;
        const readingDate = new Date(readingDateInput);
        if (Number.isNaN(readingDate.getTime())) {
          setMessage(readingMessage, "La date et l’heure du relevé sont obligatoires.", "error");
          return;
        }

        const electricityValues = selectedReadingType === "electricity" ? getElectricityMeterValues() : null;
        if (electricityValues && (Number.isNaN(electricityValues.hp) || Number.isNaN(electricityValues.hc))) {
          setMessage(readingMessage, "Renseignez les 5 chiffres HC et les 5 chiffres HP.", "error");
          return;
        }

        const payload = {
          user_id: currentSession.user.id,
          type: selectedReadingType,
          value: getReadingValue(),
          unit: getReadingUnit(selectedReadingType),
          reading_date: readingDate.toISOString(),
          reading_datetime_local: formatLocalDatetimeForDatabase(readingDateInput),
          note: null
        };

        if (Number.isNaN(payload.value) || payload.value < 0) {
          setMessage(readingMessage, "La valeur du relevé est obligatoire.", "error");
          return;
        }

        if (electricityValues) {
          payload.value_hp = electricityValues.hp;
          payload.value_hc = electricityValues.hc;
        }

        const { error } = await supabaseClient.from("readings").insert(payload);
        if (error) {
          setMessage(readingMessage, `Impossible d’enregistrer le relevé : ${error.message}`, "error");
          return;
        }

        readingForm.reset();
        resetMeterInputs();
        initDefaultDate();
        selectReadingType(payload.type);
        appCard.classList.add("hidden");
        loadReadings();
      }

      async function loadReadings() {
        if (!supabaseClient || !currentSession) {
          readingsList.innerHTML = '<p class="empty-state">Connectez-vous pour voir vos relevés.</p>';
          return;
        }

        readingsList.innerHTML = '<p class="empty-state">Chargement…</p>';
        const { data, error } = await supabaseClient
          .from("readings")
          .select("*")
          .in("user_id", sharedUserIds)
          .order("reading_datetime_local", { ascending: false, nullsFirst: false })
          .order("reading_date", { ascending: false })
          .order("created_at", { ascending: false })
          .limit(500);

        if (error) {
          readingsList.innerHTML = `<p class="empty-state">Erreur : ${error.message}</p>`;
          renderGraph([]);
          return;
        }

        if (!data || data.length === 0) {
          readingsList.innerHTML = '<p class="empty-state">Aucun relevé enregistré pour le moment.</p>';
          renderGraph([]);
          return;
        }

        renderGraph(data);
        renderReadingsList(data);
      }

      async function handleLogout() {
        if (!supabaseClient) {
          return;
        }
        await supabaseClient.auth.signOut();
        currentSession = null;
        sharedUserIds = [];
        profileLabelsById = {};
        closeUserMenu();
        setAppVisible(false);
        setMessage(authMessage, "Vous avez été déconnecté.", "success");
      }

      function bindEvents() {
        authForm.addEventListener("submit", handleAuthSubmit);
        signupBtn.addEventListener("click", () => {
          toggleAuthMode();
        });
        forgotPasswordBtn.addEventListener("click", handleForgotPassword);
        userMenuBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          toggleUserMenu();
        });
        addReadingBtn.addEventListener("click", toggleReadingForm);
        document.addEventListener("click", (event) => {
          if (!userMenu.contains(event.target)) {
            closeUserMenu();
          }
        });
        settingsBtn.addEventListener("click", toggleSettings);
        logoutBtn.addEventListener("click", handleLogout);
        prevMonthBtn.addEventListener("click", () => {
          changeGraphMonth(-1);
        });
        nextMonthBtn.addEventListener("click", () => {
          changeGraphMonth(1);
        });
        hphcToggle.addEventListener("change", () => {
          isHphcModeEnabled = hphcToggle.checked;
          renderGraph(graphReadings);
        });
        readingForm.addEventListener("submit", handleReadingSubmit);
        readingsList.addEventListener("click", (event) => {
          const deleteButton = event.target.closest("[data-delete-reading-id]");
          if (deleteButton) {
            event.stopPropagation();
            deleteReading(deleteButton.dataset.deleteReadingId);
          }
        });
        document.querySelectorAll("[data-reading-type]").forEach((button) => {
          button.addEventListener("click", () => {
            selectReadingType(button.dataset.readingType);
          });
        });
        meterDigitInputs.forEach((input) => {
          input.addEventListener("input", handleMeterDigitInput);
          input.addEventListener("keydown", handleMeterDigitKeydown);
        });
      }

      function preventPageZoom() {
        ["gesturestart", "gesturechange", "gestureend", "dblclick"].forEach((eventName) => {
          document.addEventListener(
            eventName,
            (event) => {
              event.preventDefault();
            },
            { passive: false }
          );
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        preventPageZoom();
        restoreSavedEmail();
        initDefaultDate();
        setAuthFormMode();
        selectReadingType(selectedReadingType);
        bindEvents();
        initSupabaseClient();
      });
    </script>
  </body>
</html>
