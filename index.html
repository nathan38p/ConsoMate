<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConsoMate</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #172033;
        --muted: #64748b;
        --accent: #2563eb;
        --accent-dark: #1d4ed8;
        --danger: #dc2626;
        --success: #15803d;
        --border: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #eff6ff 0%, var(--bg) 100%);
        color: var(--text);
      }

      .container {
        max-width: 860px;
        margin: 0 auto;
        padding: 32px 16px 60px;
      }

      .hero {
        align-items: center;
        display: flex;
        gap: 16px;
        justify-content: space-between;
        margin-bottom: 24px;
        position: relative;
      }

      .hero h1 {
        margin: 0;
        font-size: 2rem;
      }

      .site-title {
        color: inherit;
        text-decoration: none;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.06);
        margin-bottom: 18px;
      }

      .card h2 {
        margin-top: 0;
        margin-bottom: 16px;
        font-size: 1.1rem;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 600;
        color: var(--text);
      }

      input,
      button {
        font: inherit;
      }

      input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fcfdff;
        color: var(--text);
      }

      .actions,
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .user-menu {
        margin-left: auto;
        position: relative;
      }

      .top-actions {
        align-items: center;
        display: flex;
        gap: 10px;
        margin-left: auto;
      }

      .add-reading-btn {
        align-items: center;
        background: var(--accent);
        color: white;
        display: flex;
        font-size: 1.5rem;
        font-weight: 700;
        height: 44px;
        justify-content: center;
        line-height: 1;
        padding: 0;
        width: 44px;
      }

      .add-reading-btn:hover {
        background: var(--accent-dark);
      }

      .user-menu-btn {
        align-items: center;
        background: var(--card);
        border: 1px solid var(--border);
        color: var(--text);
        display: flex;
        height: 44px;
        justify-content: center;
        padding: 0;
        width: 44px;
      }

      .user-menu-btn svg {
        height: 21px;
        width: 21px;
      }

      .user-menu-popover {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 14px 40px rgba(15, 23, 42, 0.12);
        display: grid;
        gap: 6px;
        min-width: 180px;
        padding: 8px;
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        z-index: 10;
      }

      .user-menu-popover.hidden {
        display: none;
      }

      .user-menu-popover button {
        background: transparent;
        border-radius: 8px;
        color: var(--text);
        padding: 10px 12px;
        text-align: left;
      }

      .user-menu-popover button:hover {
        background: #f1f5f9;
      }

      .user-menu-popover button.danger-action {
        color: var(--danger);
      }

      button {
        border: none;
        border-radius: 999px;
        padding: 10px 16px;
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button.primary {
        background: var(--accent);
        color: white;
      }

      button.primary:hover {
        background: var(--accent-dark);
      }

      button.secondary {
        background: #e2e8f0;
        color: var(--text);
      }

      button.danger {
        background: #fee2e2;
        color: var(--danger);
      }

      button.danger:hover {
        background: #fecaca;
      }

      button.ghost {
        background: transparent;
        color: var(--accent);
        padding-left: 0;
      }

      .hint,
      .message,
      .empty-state {
        font-size: 0.95rem;
        color: var(--muted);
      }

      .message.success {
        color: var(--success);
      }

      .message.error {
        color: var(--danger);
      }

      .hidden {
        display: none !important;
      }

      .type-options {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .type-option {
        align-items: center;
        border: none;
        border-radius: 12px;
        color: var(--text);
        display: flex;
        font-weight: 700;
        gap: 10px;
        justify-content: center;
        min-height: 56px;
        padding: 12px;
      }

      .type-option[data-reading-type="water"] {
        background: #dbeafe;
        color: #1e40af;
      }

      .type-option[data-reading-type="electricity"] {
        background: #fef3c7;
        color: #92400e;
      }

      .type-option[aria-pressed="true"] {
        box-shadow: inset 0 0 0 2px currentColor;
        transform: translateY(-1px);
      }

      .type-emoji {
        font-size: 1.3rem;
      }

      .meter-input {
        display: grid;
        gap: 8px;
      }

      .meter-digits {
        display: grid;
        gap: 6px;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .electricity-meter-row {
        display: grid;
        gap: 6px;
      }

      .electricity-meter-label {
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
      }

      .electricity-meter-input .meter-digits {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .meter-digit {
        border: none;
        border-radius: 8px;
        font-size: 1.25rem;
        font-weight: 800;
        height: 48px;
        padding: 0;
        text-align: center;
      }

      .meter-digit.black {
        background: #111827;
        color: #ffffff;
      }

      .meter-digit.red {
        background: #b91c1c;
        color: #ffffff;
      }

      .meter-caption {
        color: var(--muted);
        display: grid;
        font-size: 0.85rem;
        font-weight: 700;
        gap: 6px;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        text-align: center;
      }

      .meter-unit {
        grid-column: 4;
      }

      .owner-pill {
        background: #e0f2fe;
        border-radius: 999px;
        color: #0369a1;
        display: inline-block;
        font-size: 0.8rem;
        font-weight: 700;
        margin-left: 6px;
        padding: 2px 8px;
      }

      .reading-item {
        align-items: center;
        border: 1px solid var(--border);
        background: #fcfdff;
        border-radius: 10px;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        margin-top: 8px;
        padding: 8px 10px;
      }

      .reading-item strong {
        display: block;
        font-size: 0.98rem;
        margin-bottom: 2px;
      }

      .reading-date {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .reading-detail {
        color: var(--muted);
        font-size: 0.86rem;
        margin-top: 2px;
      }

      .reading-footer {
        align-items: center;
        display: flex;
        flex: 0 0 auto;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: flex-end;
      }

      .delete-reading-btn {
        padding: 6px 10px;
      }

      .graph-toolbar {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .month-controls {
        align-items: center;
        display: flex;
        gap: 8px;
      }

      .month-controls button {
        align-items: center;
        background: #e2e8f0;
        color: var(--text);
        display: flex;
        height: 36px;
        justify-content: center;
        padding: 0;
        width: 36px;
      }

      .month-label {
        color: var(--text);
        font-weight: 700;
        min-width: 130px;
        text-align: center;
      }

      .graph-frame {
        min-height: 260px;
        overflow: hidden;
      }

      .graph-frame svg {
        display: block;
        height: auto;
        width: 100%;
      }

      @media (max-width: 640px) {
        .container {
          padding: 20px 12px 40px;
        }

        .card {
          padding: 18px;
        }

        #graph-card {
          padding: 16px 14px;
        }

        .graph-toolbar {
          flex-wrap: nowrap;
          gap: 8px;
          margin-bottom: 6px;
        }

        .graph-toolbar h2 {
          font-size: 1rem;
        }

        .month-controls {
          gap: 6px;
        }

        .month-controls button {
          height: 30px;
          width: 30px;
        }

        .month-label {
          font-size: 0.95rem;
          min-width: 96px;
        }

        .graph-frame {
          min-height: 0;
        }

        .graph-frame svg {
          max-height: 190px;
        }

        .reading-item {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <header class="hero">
        <h1><a class="site-title" href="index.html">ConsoMate</a></h1>
        <div id="top-actions" class="top-actions hidden">
          <button type="button" id="add-reading-btn" class="add-reading-btn" aria-label="Ajouter un relevé">+</button>
          <div id="user-menu" class="user-menu">
            <button type="button" id="user-menu-btn" class="user-menu-btn" aria-label="Menu utilisateur" aria-expanded="false">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21a8 8 0 0 0-16 0" />
                <circle cx="12" cy="7" r="4" />
              </svg>
            </button>
            <div id="user-menu-popover" class="user-menu-popover hidden">
              <button type="button" id="settings-btn">Réglages</button>
              <button type="button" id="logout-btn" class="danger-action">Se déconnecter</button>
            </div>
          </div>
        </div>
      </header>

      <section class="card" id="auth-card">
        <h2>Connexion</h2>
        <form id="auth-form" autocomplete="on">
          <label>
            E-mail
            <input id="auth-email" name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            Mot de passe
            <input id="auth-password" name="password" type="password" autocomplete="current-password" minlength="6" required />
          </label>
          <div class="actions">
            <button type="submit" id="auth-submit-btn" class="primary">Se connecter</button>
            <button type="button" id="signup-btn" class="secondary">Créer un compte</button>
          </div>
        </form>
        <p id="auth-message" class="message"></p>
      </section>

      <section class="card hidden" id="app-card">
        <div class="toolbar">
          <h2 style="margin: 0; flex: 1">Ajouter un relevé</h2>
        </div>

        <form id="reading-form">
          <label>
            Type
            <div class="type-options" role="group" aria-label="Type de relevé">
              <button type="button" class="type-option" data-reading-type="water" aria-pressed="true">
                <span class="type-emoji" aria-hidden="true">💧</span>
                Eau
              </button>
              <button type="button" class="type-option" data-reading-type="electricity" aria-pressed="false">
                <span class="type-emoji" aria-hidden="true">⚡</span>
                Électricité
              </button>
            </div>
          </label>
          <label>
            Date et heure du relevé
            <input id="reading-date" type="datetime-local" required />
          </label>
          <label>
            Valeur
            <div id="water-meter-input" class="meter-input">
              <div class="meter-digits" aria-label="Valeur du compteur d'eau">
                <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-meter-digit="whole" aria-label="Milliers de mètre cube" />
                <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-meter-digit="whole" aria-label="Centaines de mètre cube" />
                <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-meter-digit="whole" aria-label="Dizaines de mètre cube" />
                <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-meter-digit="whole" aria-label="Unités de mètre cube" />
                <input class="meter-digit red" type="text" inputmode="numeric" maxlength="1" data-meter-digit="decimal" aria-label="Première décimale" />
                <input class="meter-digit red" type="text" inputmode="numeric" maxlength="1" data-meter-digit="decimal" aria-label="Deuxième décimale" />
                <input class="meter-digit red" type="text" inputmode="numeric" maxlength="1" data-meter-digit="decimal" aria-label="Troisième décimale" />
              </div>
              <div class="meter-caption">
                <span class="meter-unit">m³</span>
              </div>
            </div>
            <div id="electricity-meter-input" class="meter-input electricity-meter-input hidden">
              <div class="electricity-meter-row">
                <span class="electricity-meter-label">HP</span>
                <div class="meter-digits" aria-label="Valeur du compteur heures pleines">
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hp" aria-label="Dizaine de milliers heures pleines" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hp" aria-label="Milliers heures pleines" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hp" aria-label="Centaines heures pleines" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hp" aria-label="Dizaines heures pleines" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hp" aria-label="Unités heures pleines" />
                </div>
              </div>
              <div class="electricity-meter-row">
                <span class="electricity-meter-label">HC</span>
                <div class="meter-digits" aria-label="Valeur du compteur heures creuses">
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hc" aria-label="Dizaine de milliers heures creuses" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hc" aria-label="Milliers heures creuses" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hc" aria-label="Centaines heures creuses" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hc" aria-label="Dizaines heures creuses" />
                  <input class="meter-digit black" type="text" inputmode="numeric" maxlength="1" data-electricity-meter-digit data-electricity-meter="hc" aria-label="Unités heures creuses" />
                </div>
              </div>
              <div class="meter-caption">
                <span class="meter-unit">kWh</span>
              </div>
            </div>
          </label>
          <div class="actions">
            <button type="submit" class="primary">Enregistrer</button>
          </div>
        </form>
      </section>

      <section class="card hidden" id="graph-card">
        <div class="graph-toolbar">
          <h2 style="margin: 0">Graphe</h2>
          <div class="month-controls">
            <button type="button" id="prev-month-btn" aria-label="Mois précédent">‹</button>
            <span id="graph-month-label" class="month-label"></span>
            <button type="button" id="next-month-btn" aria-label="Mois suivant">›</button>
          </div>
        </div>
        <div id="graph-frame" class="graph-frame"></div>
      </section>

      <section class="card hidden" id="readings-card">
        <p id="reading-message" class="message"></p>

        <h2>Derniers relevés partagés</h2>
        <div id="readings-list" class="empty-state">Chargement…</div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const DEFAULT_SUPABASE_URL = "https://jjafxjyrnysujgwwtkte.supabase.co";
      const DEFAULT_SUPABASE_KEY = "sb_publishable_KZqc80abiojlxzIe5cnJew_-L2IPfvX";
      const LAST_EMAIL_KEY = "consomate-last-email";

      let supabaseClient = null;
      let currentSession = null;
      let authMode = "signin";
      let selectedReadingType = "water";
      let selectedGraphMonth = new Date();
      let graphReadings = [];
      let sharedUserIds = [];
      let profileEmailsById = {};

      const authForm = document.getElementById("auth-form");
      const authMessage = document.getElementById("auth-message");
      const authSubmitBtn = document.getElementById("auth-submit-btn");
      const signupBtn = document.getElementById("signup-btn");
      const topActions = document.getElementById("top-actions");
      const addReadingBtn = document.getElementById("add-reading-btn");
      const userMenu = document.getElementById("user-menu");
      const userMenuBtn = document.getElementById("user-menu-btn");
      const userMenuPopover = document.getElementById("user-menu-popover");
      const settingsBtn = document.getElementById("settings-btn");
      const logoutBtn = document.getElementById("logout-btn");
      const readingForm = document.getElementById("reading-form");
      const waterMeterInput = document.getElementById("water-meter-input");
      const electricityMeterInput = document.getElementById("electricity-meter-input");
      const waterMeterDigitInputs = [...document.querySelectorAll("[data-meter-digit]")];
      const electricityMeterDigitInputs = [...document.querySelectorAll("[data-electricity-meter-digit]")];
      const meterDigitInputs = [...waterMeterDigitInputs, ...electricityMeterDigitInputs];
      const readingMessage = document.getElementById("reading-message");
      const readingsList = document.getElementById("readings-list");
      const graphFrame = document.getElementById("graph-frame");
      const graphMonthLabel = document.getElementById("graph-month-label");
      const prevMonthBtn = document.getElementById("prev-month-btn");
      const nextMonthBtn = document.getElementById("next-month-btn");
      const authCard = document.getElementById("auth-card");
      const appCard = document.getElementById("app-card");
      const graphCard = document.getElementById("graph-card");
      const readingsCard = document.getElementById("readings-card");

      function setMessage(element, text, type = "") {
        element.textContent = text;
        element.className = `message ${type}`.trim();
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function setAppVisible(isLoggedIn) {
        authCard.classList.toggle("hidden", isLoggedIn);
        topActions.classList.toggle("hidden", !isLoggedIn);
        graphCard.classList.toggle("hidden", !isLoggedIn);
        readingsCard.classList.toggle("hidden", !isLoggedIn);
        if (!isLoggedIn) {
          appCard.classList.add("hidden");
        }
        if (!isLoggedIn) {
          closeUserMenu();
        }
      }

      function closeUserMenu() {
        userMenuPopover.classList.add("hidden");
        userMenuBtn.setAttribute("aria-expanded", "false");
      }

      function toggleUserMenu() {
        const isOpen = !userMenuPopover.classList.contains("hidden");
        userMenuPopover.classList.toggle("hidden", isOpen);
        userMenuBtn.setAttribute("aria-expanded", String(!isOpen));
      }

      function toggleReadingForm() {
        appCard.classList.toggle("hidden");
        if (!appCard.classList.contains("hidden")) {
          focusCurrentValueInput();
        }
      }

      function getCurrentDateTimeString() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        const hours = String(now.getHours()).padStart(2, "0");
        const minutes = String(now.getMinutes()).padStart(2, "0");

        return `${year}-${month}-${day}T${hours}:${minutes}`;
      }

      function initDefaultDate() {
        document.getElementById("reading-date").value = getCurrentDateTimeString();
      }

      function restoreSavedEmail() {
        const savedEmail = localStorage.getItem(LAST_EMAIL_KEY);
        if (savedEmail) {
          document.getElementById("auth-email").value = savedEmail;
        }
      }

      async function initSupabaseClient() {
        const url = DEFAULT_SUPABASE_URL;
        const key = DEFAULT_SUPABASE_KEY;

        if (!url || !key) {
          setMessage(authMessage, "Les identifiants Supabase sont introuvables.", "error");
          setAppVisible(false);
          return;
        }

        supabaseClient = window.supabase.createClient(url, key, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true
          }
        });

        const { data: sessionData } = await supabaseClient.auth.getSession();
        currentSession = sessionData.session;

        supabaseClient.auth.onAuthStateChange((_event, session) => {
          currentSession = session;
          setAppVisible(Boolean(session));
          if (session) {
            refreshSharedData();
          }
        });

        setAppVisible(Boolean(currentSession));
        if (currentSession) {
          refreshSharedData();
        }
      }

      async function ensureCurrentProfile() {
        if (!supabaseClient || !currentSession) {
          return;
        }

        await supabaseClient.from("profiles").upsert({
          id: currentSession.user.id,
          email: currentSession.user.email.toLowerCase()
        });
      }

      async function refreshSharedData() {
        await ensureCurrentProfile();
        await loadMates();
        await loadReadings();
      }

      async function handleAuthSubmit(event) {
        event.preventDefault();
        if (!supabaseClient) {
          setMessage(authMessage, "La connexion Supabase n’est pas prête.", "error");
          return;
        }

        const email = document.getElementById("auth-email").value.trim();
        const password = document.getElementById("auth-password").value;

        if (!email || !password) {
          setMessage(authMessage, "Saisissez un e-mail et un mot de passe.", "error");
          return;
        }

        setMessage(authMessage, "Traitement en cours…", "");
        localStorage.setItem(LAST_EMAIL_KEY, email);

        let response;
        if (authMode === "signup") {
          response = await supabaseClient.auth.signUp({ email, password });
        } else {
          response = await supabaseClient.auth.signInWithPassword({ email, password });
        }

        if (response.error) {
          setMessage(authMessage, response.error.message, "error");
          return;
        }

        currentSession = response.data.session;
        setAppVisible(Boolean(currentSession));

        if (authMode === "signup") {
          if (currentSession) {
            setMessage(authMessage, "Compte créé et connecté.", "success");
          } else {
            setMessage(authMessage, "Compte créé. Vérifiez votre boîte mail si la confirmation par e-mail est activée.", "success");
          }
        } else {
          setMessage(authMessage, "Connexion réussie.", "success");
        }

        if (currentSession) {
          refreshSharedData();
        }
      }

      function toggleAuthMode() {
        authMode = authMode === "signin" ? "signup" : "signin";
        signupBtn.textContent = authMode === "signin" ? "Créer un compte" : "Retour à la connexion";
        authSubmitBtn.textContent = authMode === "signin" ? "Se connecter" : "Créer le compte";
        document.getElementById("auth-password").autocomplete = authMode === "signin" ? "current-password" : "new-password";
      }

      function toggleSettings() {
        window.location.href = "settings.html";
      }

      function getReadingUnit(type) {
        return type === "water" ? "m³" : "kWh";
      }

      function selectReadingType(type) {
        selectedReadingType = type;
        document.querySelectorAll("[data-reading-type]").forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.readingType === type));
        });
        waterMeterInput.classList.toggle("hidden", type !== "water");
        electricityMeterInput.classList.toggle("hidden", type !== "electricity");
      }

      function normalizeLocalDatetime(value) {
        if (!value) {
          return value;
        }

        return value.includes("T") ? value : value.replace(" ", "T");
      }

      function getReadingDatetime(reading) {
        return normalizeLocalDatetime(reading.reading_datetime_local || reading.reading_date);
      }

      function formatReadingDate(value) {
        const date = new Date(normalizeLocalDatetime(value));
        if (Number.isNaN(date.getTime())) {
          return value;
        }

        return date.toLocaleString("fr-FR", {
          dateStyle: "short",
          timeStyle: "short"
        });
      }

      function formatMonthLabel(date) {
        return date.toLocaleDateString("fr-FR", {
          month: "long",
          year: "numeric"
        });
      }

      function getMonthBounds(date) {
        const start = new Date(date.getFullYear(), date.getMonth(), 1);
        const end = new Date(date.getFullYear(), date.getMonth() + 1, 1);
        return { start, end };
      }

      function changeGraphMonth(offset) {
        selectedGraphMonth = new Date(selectedGraphMonth.getFullYear(), selectedGraphMonth.getMonth() + offset, 1);
        renderGraph(graphReadings);
      }

      function formatLocalDatetimeForDatabase(value) {
        return value.length === 16 ? `${value}:00` : value;
      }

      function getWaterMeterValue() {
        const hasAnyDigit = waterMeterDigitInputs.some((input) => input.value);
        if (!hasAnyDigit) {
          return Number.NaN;
        }

        const whole = waterMeterDigitInputs
          .filter((input) => input.dataset.meterDigit === "whole")
          .map((input) => input.value || "0")
          .join("");
        const decimals = waterMeterDigitInputs
          .filter((input) => input.dataset.meterDigit === "decimal")
          .map((input) => input.value || "0")
          .join("");

        return Number(`${whole}.${decimals}`);
      }

      function getElectricityMeterPartValue(part) {
        const inputs = electricityMeterDigitInputs.filter((input) => input.dataset.electricityMeter === part);
        if (inputs.some((input) => !input.value)) {
          return Number.NaN;
        }

        return Number(inputs.map((input) => input.value).join(""));
      }

      function getElectricityMeterValues() {
        const hp = getElectricityMeterPartValue("hp");
        const hc = getElectricityMeterPartValue("hc");

        return {
          hp,
          hc,
          total: hp + hc
        };
      }

      function getReadingValue() {
        if (selectedReadingType === "water") {
          return getWaterMeterValue();
        }

        return getElectricityMeterValues().total;
      }

      function getReadingTotalValue(reading) {
        if (reading.type === "electricity" && reading.value_hp != null && reading.value_hc != null) {
          return Number(reading.value_hp) + Number(reading.value_hc);
        }

        return Number(reading.value);
      }

      function resetMeterInputs() {
        meterDigitInputs.forEach((input) => {
          input.value = "";
        });
      }

      function focusCurrentValueInput() {
        if (selectedReadingType === "water") {
          waterMeterDigitInputs[0].focus();
          return;
        }

        electricityMeterDigitInputs[0].focus();
      }

      function handleMeterDigitInput(event) {
        const input = event.target;
        input.value = input.value.replace(/\D/g, "").slice(-1);

        if (input.value) {
          const digitInputs = [...input.closest(".meter-input").querySelectorAll(".meter-digit")];
          const nextInput = digitInputs[digitInputs.indexOf(input) + 1];
          if (nextInput) {
            nextInput.focus();
          }
        }
      }

      function handleMeterDigitKeydown(event) {
        if (event.key !== "Backspace" || event.target.value) {
          return;
        }

        const digitInputs = [...event.target.closest(".meter-input").querySelectorAll(".meter-digit")];
        const previousInput = digitInputs[digitInputs.indexOf(event.target) - 1];
        if (previousInput) {
          previousInput.focus();
        }
      }

      function buildConsumptionSeries(readings, type, monthStart, monthEnd) {
        const dailyTotals = new Map();
        const groupedReadings = new Map();

        readings
          .filter((reading) => reading.type === type)
          .forEach((reading) => {
            const ownerReadings = groupedReadings.get(reading.user_id) || [];
            ownerReadings.push(reading);
            groupedReadings.set(reading.user_id, ownerReadings);
          });

        groupedReadings.forEach((ownerReadings) => {
          ownerReadings
            .sort((a, b) => {
              const readingDateDiff = new Date(getReadingDatetime(a)) - new Date(getReadingDatetime(b));
              if (readingDateDiff !== 0) {
                return readingDateDiff;
              }

              return new Date(a.created_at) - new Date(b.created_at);
            })
            .forEach((reading, index, sortedReadings) => {
              const readingDate = new Date(getReadingDatetime(reading));
              if (readingDate < monthStart || readingDate >= monthEnd || index === 0) {
                return;
              }

              const previousValue = getReadingTotalValue(sortedReadings[index - 1]);
              const currentValue = getReadingTotalValue(reading);
              const consumption = currentValue - previousValue;
              if (Number.isNaN(consumption) || consumption < 0) {
                return;
              }

              const day = readingDate.getDate();
              dailyTotals.set(day, (dailyTotals.get(day) || 0) + consumption);
            });
        });

        let cumulative = 0;
        const series = Array.from(dailyTotals.entries())
          .sort(([dayA], [dayB]) => dayA - dayB)
          .map(([day, total]) => {
            cumulative += total;
            return {
              day,
              value: cumulative
            };
          });

        if (series.length === 0) {
          return [];
        }

        return [
          {
            day: 1,
            value: 0
          },
          ...series
        ];
      }

      function createPolyline(points, maxValue, chart, daysInMonth) {
        if (points.length === 0 || maxValue <= 0) {
          return "";
        }

        return points
          .map((point) => {
            const x = chart.left + ((point.day - 1) / Math.max(daysInMonth - 1, 1)) * chart.width;
            const y = chart.top + chart.height - (point.value / maxValue) * chart.height;
            return `${x.toFixed(1)},${y.toFixed(1)}`;
          })
          .join(" ");
      }

      function createPointCircles(points, maxValue, chart, daysInMonth, color) {
        if (points.length === 0 || maxValue <= 0) {
          return "";
        }

        return points
          .filter((point) => point.value > 0)
          .map((point) => {
            const x = chart.left + ((point.day - 1) / Math.max(daysInMonth - 1, 1)) * chart.width;
            const y = chart.top + chart.height - (point.value / maxValue) * chart.height;
            return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="${color}" />`;
          })
          .join("");
      }

      function formatGraphMax(value, unit) {
        if (value === 0) {
          return `0 ${unit}`;
        }

        const precision = value < 1 ? 3 : 1;
        return `${value.toFixed(precision)} ${unit}`;
      }

      function formatMeterIndex(value) {
        const numericValue = Number(value);
        if (!Number.isFinite(numericValue)) {
          return value;
        }

        return String(Math.trunc(numericValue)).padStart(5, "0");
      }

      function renderGraph(readings = []) {
        graphReadings = readings;
        const { start, end } = getMonthBounds(selectedGraphMonth);
        graphMonthLabel.textContent = formatMonthLabel(start);

        const waterSeries = buildConsumptionSeries(readings, "water", start, end);
        const electricitySeries = buildConsumptionSeries(readings, "electricity", start, end);
        const waterMax = Math.max(...waterSeries.map((point) => point.value), 0);
        const electricityMax = Math.max(...electricitySeries.map((point) => point.value), 0);

        if (waterMax === 0 && electricityMax === 0) {
          graphFrame.innerHTML = '<p class="empty-state">Aucune consommation calculable pour ce mois.</p>';
          return;
        }

        const chart = {
          left: 54,
          top: 18,
          width: 520,
          height: 180
        };
        const graphEndDay = 31;
        const waterPoints = createPolyline(waterSeries, waterMax, chart, graphEndDay);
        const electricityPoints = createPolyline(electricitySeries, electricityMax, chart, graphEndDay);
        const waterMarkers = createPointCircles(waterSeries, waterMax, chart, graphEndDay, "#2563eb");
        const electricityMarkers = createPointCircles(electricitySeries, electricityMax, chart, graphEndDay, "#f59e0b");
        const xStart = chart.left;
        const xMiddle = chart.left + chart.width / 2;
        const xEnd = chart.left + chart.width;

        graphFrame.innerHTML = `
          <svg viewBox="0 0 650 245" role="img" aria-label="Consommation mensuelle">
            <line x1="${chart.left}" y1="${chart.top}" x2="${chart.left}" y2="${chart.top + chart.height}" stroke="#cbd5e1" />
            <line x1="${chart.left + chart.width}" y1="${chart.top}" x2="${chart.left + chart.width}" y2="${chart.top + chart.height}" stroke="#cbd5e1" />
            <line x1="${chart.left}" y1="${chart.top + chart.height}" x2="${chart.left + chart.width}" y2="${chart.top + chart.height}" stroke="#cbd5e1" />
            <text x="8" y="${chart.top + 12}" fill="#2563eb" font-size="12">${formatGraphMax(waterMax, "m3")}</text>
            <text x="8" y="${chart.top + chart.height}" fill="#2563eb" font-size="12">0 m3</text>
            <text x="586" y="${chart.top + 12}" fill="#b45309" font-size="12">${formatGraphMax(electricityMax, "kWh")}</text>
            <text x="586" y="${chart.top + chart.height}" fill="#b45309" font-size="12">0 kWh</text>
            <text x="${xStart}" y="226" fill="#64748b" font-size="12">1</text>
            <text x="${xMiddle - 8}" y="226" fill="#64748b" font-size="12">16</text>
            <text x="${xEnd - 12}" y="226" fill="#64748b" font-size="12">31</text>
            ${
              waterPoints
                ? `<polyline points="${waterPoints}" fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />`
                : ""
            }
            ${
              electricityPoints
                ? `<polyline points="${electricityPoints}" fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />`
                : ""
            }
            ${waterMarkers}
            ${electricityMarkers}
          </svg>
        `;
      }

      async function deleteReading(readingId) {
        if (!supabaseClient || !currentSession) {
          setMessage(readingMessage, "Vous devez être connecté pour supprimer un relevé.", "error");
          return;
        }

        const shouldDelete = window.confirm("Supprimer ce relevé ?");
        if (!shouldDelete) {
          return;
        }

        const { error } = await supabaseClient
          .from("readings")
          .delete()
          .eq("id", readingId)
          .eq("user_id", currentSession.user.id);

        if (error) {
          setMessage(readingMessage, `Impossible de supprimer le relevé : ${error.message}`, "error");
          return;
        }

        setMessage(readingMessage, "Relevé supprimé.", "success");
        await loadReadings();
      }

      async function loadMates() {
        if (!supabaseClient || !currentSession) {
          return;
        }

        const userId = currentSession.user.id;
        sharedUserIds = [userId];
        profileEmailsById = {
          [userId]: currentSession.user.email
        };

        const { data: mateRows, error } = await supabaseClient
          .from("mates")
          .select("id,owner_id,mate_id")
          .or(`owner_id.eq.${userId},mate_id.eq.${userId}`);

        if (error) {
          return;
        }

        const mateIds = [...new Set((mateRows || []).map((row) => (row.owner_id === userId ? row.mate_id : row.owner_id)))];
        sharedUserIds = [userId, ...mateIds];

        if (mateIds.length === 0) {
          return;
        }

        const { data: profiles, error: profilesError } = await supabaseClient
          .from("profiles")
          .select("id,email")
          .in("id", mateIds);

        if (profilesError) {
          return;
        }

        (profiles || []).forEach((profile) => {
          profileEmailsById[profile.id] = profile.email;
        });
      }

      async function handleReadingSubmit(event) {
        event.preventDefault();
        if (!supabaseClient || !currentSession) {
          setMessage(readingMessage, "Vous devez être connecté pour enregistrer un relevé.", "error");
          return;
        }

        const readingDateInput = document.getElementById("reading-date").value;
        const readingDate = new Date(readingDateInput);
        if (Number.isNaN(readingDate.getTime())) {
          setMessage(readingMessage, "La date et l’heure du relevé sont obligatoires.", "error");
          return;
        }

        const electricityValues = selectedReadingType === "electricity" ? getElectricityMeterValues() : null;
        if (electricityValues && (Number.isNaN(electricityValues.hp) || Number.isNaN(electricityValues.hc))) {
          setMessage(readingMessage, "Renseignez les 5 chiffres HP et les 5 chiffres HC.", "error");
          return;
        }

        const payload = {
          user_id: currentSession.user.id,
          type: selectedReadingType,
          value: getReadingValue(),
          unit: getReadingUnit(selectedReadingType),
          reading_date: readingDate.toISOString(),
          reading_datetime_local: formatLocalDatetimeForDatabase(readingDateInput),
          note: null
        };

        if (Number.isNaN(payload.value) || payload.value < 0) {
          setMessage(readingMessage, "La valeur du relevé est obligatoire.", "error");
          return;
        }

        if (electricityValues) {
          payload.value_hp = electricityValues.hp;
          payload.value_hc = electricityValues.hc;
        }

        const { error } = await supabaseClient.from("readings").insert(payload);
        if (error) {
          setMessage(readingMessage, `Impossible d’enregistrer le relevé : ${error.message}`, "error");
          return;
        }

        readingForm.reset();
        resetMeterInputs();
        initDefaultDate();
        selectReadingType(payload.type);
        appCard.classList.add("hidden");
        setMessage(readingMessage, "Relevé enregistré dans la base Supabase.", "success");
        loadReadings();
      }

      async function loadReadings() {
        if (!supabaseClient || !currentSession) {
          readingsList.innerHTML = '<p class="empty-state">Connectez-vous pour voir vos relevés.</p>';
          return;
        }

        readingsList.innerHTML = '<p class="empty-state">Chargement…</p>';
        const { data, error } = await supabaseClient
          .from("readings")
          .select("*")
          .in("user_id", sharedUserIds)
          .order("reading_datetime_local", { ascending: false, nullsFirst: false })
          .order("reading_date", { ascending: false })
          .order("created_at", { ascending: false })
          .limit(500);

        if (error) {
          readingsList.innerHTML = `<p class="empty-state">Erreur : ${error.message}</p>`;
          renderGraph([]);
          return;
        }

        if (!data || data.length === 0) {
          readingsList.innerHTML = '<p class="empty-state">Aucun relevé enregistré pour le moment.</p>';
          renderGraph([]);
          return;
        }

        renderGraph(data);
        readingsList.innerHTML = data
          .slice(0, 10)
          .map((reading) => {
            const typeLabel = reading.type === "water" ? "Eau" : "Électricité";
            const ownerLabel = reading.user_id === currentSession.user.id ? "Moi" : profileEmailsById[reading.user_id] || "Mate";
            const totalValue = getReadingTotalValue(reading);
            const hasElectricityDetails = reading.type === "electricity" && reading.value_hp != null && reading.value_hc != null;
            const readingDetail = hasElectricityDetails
              ? `<div class="reading-detail">HP ${escapeHtml(formatMeterIndex(reading.value_hp))} kWh + HC ${escapeHtml(formatMeterIndex(reading.value_hc))} kWh</div>`
              : "";
            const deleteButton =
              reading.user_id === currentSession.user.id
                ? `<button type="button" class="danger delete-reading-btn" data-delete-reading-id="${escapeHtml(reading.id)}">Supprimer</button>`
                : "";

            return `
              <article class="reading-item">
                <div>
                  <strong>${typeLabel} — ${escapeHtml(totalValue)} ${escapeHtml(reading.unit)}<span class="owner-pill">${escapeHtml(ownerLabel)}</span></strong>
                  <div class="reading-date">${escapeHtml(formatReadingDate(getReadingDatetime(reading)))}</div>
                  ${readingDetail}
                </div>
                <div class="reading-footer">
                  ${deleteButton}
                </div>
              </article>
            `;
          })
          .join("");
      }

      async function handleLogout() {
        if (!supabaseClient) {
          return;
        }
        await supabaseClient.auth.signOut();
        currentSession = null;
        sharedUserIds = [];
        profileEmailsById = {};
        closeUserMenu();
        setAppVisible(false);
        setMessage(authMessage, "Vous avez été déconnecté.", "success");
      }

      function bindEvents() {
        authForm.addEventListener("submit", handleAuthSubmit);
        signupBtn.addEventListener("click", () => {
          toggleAuthMode();
        });
        userMenuBtn.addEventListener("click", (event) => {
          event.stopPropagation();
          toggleUserMenu();
        });
        addReadingBtn.addEventListener("click", toggleReadingForm);
        document.addEventListener("click", (event) => {
          if (!userMenu.contains(event.target)) {
            closeUserMenu();
          }
        });
        settingsBtn.addEventListener("click", toggleSettings);
        logoutBtn.addEventListener("click", handleLogout);
        prevMonthBtn.addEventListener("click", () => {
          changeGraphMonth(-1);
        });
        nextMonthBtn.addEventListener("click", () => {
          changeGraphMonth(1);
        });
        readingForm.addEventListener("submit", handleReadingSubmit);
        readingsList.addEventListener("click", (event) => {
          const deleteButton = event.target.closest("[data-delete-reading-id]");
          if (deleteButton) {
            deleteReading(deleteButton.dataset.deleteReadingId);
          }
        });
        document.querySelectorAll("[data-reading-type]").forEach((button) => {
          button.addEventListener("click", () => {
            selectReadingType(button.dataset.readingType);
          });
        });
        meterDigitInputs.forEach((input) => {
          input.addEventListener("input", handleMeterDigitInput);
          input.addEventListener("keydown", handleMeterDigitKeydown);
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        restoreSavedEmail();
        initDefaultDate();
        selectReadingType(selectedReadingType);
        bindEvents();
        initSupabaseClient();
      });
    </script>
  </body>
</html>
